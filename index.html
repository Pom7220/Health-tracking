  });
  html += '</div>';

  // ══════════════════════════════════════════════════════════
  // CONTEXT: HOME
  // ══════════════════════════════════════════════════════════
  if(S.insContext==='home'){

    // ── Alerts + Premium — one clean joined block ─────────────
    var selfPrem = activePols.reduce(function(s,p){return s+(p.selfPaid!==false&&p.premium?(parseFloat(p.premium)||0):0);},0);
    var nowT = new Date();
    var yr2  = nowT.getFullYear();
    var alerts = [];

    // Policy expiry within 90 days
    myPols.forEach(function(p){
      if(!p.endDate) return;
      var exp = new Date(p.endDate);
      var days = Math.ceil((exp - nowT) / 86400000);
      if(days >= 0 && days <= 90)
        alerts.push({type:'expiry', days:days, text: p.no + ' ' + (th?'หมดอายุใน':'expires in') + ' ' + days + (th?' วัน':' days') + ' (' + p.endDate + ')'});
    });

    // Premium due within 90 days (self-paid, unpaid)
    activePols.forEach(function(p){
      if(!p.dueMonth || !p.selfPaid || !(p.premium>0)) return;
      if(isPaid(p.no, yr2)) return;
      var due = new Date(yr2, p.dueMonth-1, 15);

    });

    alerts.sort(function(a,b){return a.days - b.days;});

// ── Patient card strip — reusable renderer ─────────────────────
function renderPatientCardStrip(pr, th, fullView){
  // Show cards that belong to this profile, OR cards with no profile set (legacy — shown for all)
  var myCards = HOSP_CARDS.filter(function(c){return c.profileId===pr.dbId || !c.profileId;});
  var html = '';
  if(fullView){
    // Full-size cards for OPD context
    if(!myCards.length){
      html += '<div style="text-align:center;padding:16px;color:var(--t3);font-size:12px;background:rgba(255,255,255,.04);border-radius:12px;border:1px dashed rgba(255,255,255,.15);margin-bottom:10px">'+(th?'ยังไม่มีบัตรหาหมอ':'No patient cards yet')+'<br><button onclick="openAddStandaloneCard()" style="margin-top:8px;padding:5px 12px;background:rgba(38,217,176,.1);border:1px solid rgba(38,217,176,.3);color:var(--teal);border-radius:8px;cursor:pointer;font-size:11px">+ '+(th?'เพิ่มบัตร':'Add')+'</button></div>';
      return html;
    }
    myCards.forEach(function(c){
      var idx = HOSP_CARDS.indexOf(c);
      html += '<div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 12px;margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:10px">';
      if(c.image){
        html += '<img src="'+c.image+'" onclick="viewCardImage(\''+c.image+'\')" style="width:80px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0">';
      } else {
        html += '<div onclick="openEditStandaloneCard('+idx+')" style="width:80px;height:52px;background:rgba(38,217,176,.07);border:1px dashed rgba(38,217,176,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:20px">&#x1F4F7;</div>';
      }
      html += '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--t1)">'+c.title+'</div>';
      if(c.hospital) html += '<div style="font-size:11px;color:var(--t3)">&#x1F3E5; '+c.hospital+'</div>';
      if(c.cardNo) html += '<div style="font-size:17px;font-weight:700;color:var(--teal);letter-spacing:2px;font-family:monospace;margin-top:2px">'+c.cardNo+'</div>';
      if(c.notes) html += '<div style="font-size:11px;color:var(--amber)">'+c.notes+'</div>';
      html += '</div></div></div>';
    });
    return html;
  }
  // Compact strip for home context
  html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px">&#x1F3E5; '+(th?'บัตรหาหมอ':'Patient cards')+'<button onclick="openAddStandaloneCard()" style="margin-left:8px;padding:2px 8px;background:rgba(38,217,176,.1);border:1px solid rgba(38,217,176,.3);color:var(--teal);border-radius:6px;cursor:pointer;font-size:10px">+</button></div>';
  if(!myCards.length){
    html += '<div style="font-size:12px;color:var(--t3);padding:4px 0 8px">'+(th?'ยังไม่มีบัตรหาหมอ':'No patient cards yet')+'</div>';
    return html;
  }
  html += '<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none">';
  myCards.forEach(function(c){
    var idx = HOSP_CARDS.indexOf(c);
    html += '<div onclick="openEditStandaloneCard('+idx+')" style="flex-shrink:0;width:120px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px;cursor:pointer">';
    if(c.image){
      html += '<img src="'+c.image+'" onclick="event.stopPropagation();viewCardImage(\''+c.image+'\')" style="width:100%;height:48px;object-fit:cover;border-radius:6px;margin-bottom:4px">';
    } else {
      html += '<div style="width:100%;height:48px;background:rgba(38,217,176,.07);border:1px dashed rgba(38,217,176,.3);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;font-size:18px">&#x1F4F7;</div>';
    }
    html += '<div style="font-size:11px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c.title+'</div>';
    if(c.cardNo) html += '<div style="font-size:12px;font-weight:700;color:var(--teal);font-family:monospace;letter-spacing:1px;margin-top:1px">'+c.cardNo+'</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}


// ── SITUATION VIEW: flat table by coverage type ───────────────
function renderInsuranceSituation(pols, view, th){
  // Map view → rider cats to include
  var catMap = {
    room: ['ipd_room_board'],
    icu:  ['ipd_room_board'],  // filtered by ICU in name
    surg: ['ipd_surgery','ipd_surgery_room','ipd_anesthesia'],
    opd:  ['opd_general'],                              // OPD = outpatient general visit only
    er:   ['opd_accident','accident_medical'],           // ER = emergency/accident OPD
    cash: ['daily_hospital_cash'],
    ci:   ['critical_illness_severe','critical_illness_early','critical_illness_cancer'],
    meds: ['ipd_discharge_meds','opd_lab','other','opd_consult']  // ยากลับบ้าน + lab + consult
  };
  var cats = catMap[view] || [];
  var isICU = (view==='icu');

  // Collect matching riders across all policies
  var rows = [];
  pols.forEach(function(pol){
    var ins = INSURERS_DEMO.find(function(i){return i.code===pol.insurer;});
    var color = ins ? ins.color : '#888';
    (pol.riders||[]).forEach(function(r){
      if(cats.indexOf(r.cat)<0) return;
      // ICU: only riders with ICU/ICC in name
      if(isICU && !isICURider(r.name||'') && !isICURider(r.code||'')) return;
      // Room (non-ICU): exclude ICU-named riders
      if(view==='room' && isICURider(r.name||'')) return;
      rows.push({pol:pol, r:r, color:color});
    });
  });

  // Add lump-sum (เหมาจ่าย) policies that cover this category
  // IPD lump-sum = covers room, ICU, surgery, medical all-in-one
  var lumpSumCats = ['room','icu','surg'];
  if(lumpSumCats.indexOf(view)>=0){
    pols.forEach(function(pol){
      var ins = INSURERS_DEMO.find(function(i){return i.code===pol.insurer;});
      var color = ins ? ins.color : '#888';
      (pol.riders||[]).forEach(function(r){
        if(r.cat!=='ipd_total') return;
        // Only add if not already in rows (no specific rider for this view)
        var alreadyCovered = rows.some(function(x){return x.pol.no===pol.no;});
        if(!alreadyCovered){
          rows.push({pol:pol, r:r, color:color, isLumpSum:true});
        }
      });
    });
  }

  if(!rows.length){
    return '<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:13px">'+
           (th?'ไม่พบความคุ้มครองประเภทนี้':'No coverage found for this category')+'</div>';
  }

  // Sort: fromFirst (no deductible) first, then by amount desc
  rows.sort(function(a,b){
    if(a.r.fromFirst && !b.r.fromFirst) return -1;
    if(!a.r.fromFirst && b.r.fromFirst) return 1;
    var va = a.r.perDay||a.r.amount||0;
    var vb = b.r.perDay||b.r.amount||0;
    return vb-va;
  });

  var html = '';

  // Summary card at top
  var fromFirstRows = rows.filter(function(x){return x.r.fromFirst;});
  var dedRows = rows.filter(function(x){return !x.r.fromFirst;});
  html += '<div style="background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.2);border-radius:14px;padding:12px 14px;margin-bottom:12px">';
  html += '<div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:6px">&#x1F4A1; '+(th?'สรุปความคุ้มครอง':'Coverage Summary')+'</div>';
  if(fromFirstRows.length){
    var best = fromFirstRows[0];
    var bestVal = best.r.perDay ? best.r.perDay.toLocaleString()+(th?' ฿/วัน':' ฿/day') : (best.r.amount?(best.r.amount/1000).toFixed(0)+'K ฿':'');
    html += '<div style="font-size:12px;color:var(--t2);margin-bottom:3px">&#x2705; <b>'+(th?'ใช้ได้ตั้งแต่บาทแรก:':'From 1st baht:')+'</b> '+best.pol.insurer+' '+best.r.name+' <span style="color:var(--green);font-weight:700">'+bestVal+'</span></div>';
  }
  if(dedRows.length){
    var minDed = Math.min.apply(null, dedRows.map(function(x){return x.r.deductible||999999;}));
    html += '<div style="font-size:12px;color:var(--t2)">&#x26A0;&#xFE0F; <b>'+(th?'หลังจาก deductible:':'After deductible:')+'</b> '+
            dedRows.length+(th?' รายการ (ต่ำสุด ':' items (min deductible ')+minDed.toLocaleString()+' ฿)</div>';
  }
  html += '</div>';

  // Table of all matching riders
  rows.forEach(function(x){
    var pol=x.pol, r=x.r;
    var valStr = r.perDay ? '<span style="font-size:18px;font-weight:800;color:var(--teal)">'+r.perDay.toLocaleString()+'</span><span style="font-size:10px;color:var(--t3)"> ฿/'+(th?'วัน':'day')+'</span>' :
                 r.amount ? '<span style="font-size:18px;font-weight:800;color:var(--teal)">'+(r.amount>=10000?(r.amount/1000).toFixed(0)+'K':r.amount.toLocaleString())+'</span><span style="font-size:10px;color:var(--t3)"> ฿</span>' : '';
    var dedStr = (r.hasDeductible && r.deductible) ?
      '<div style="font-size:10px;color:var(--red);margin-top:2px">&#x26A0; Deductible '+r.deductible.toLocaleString()+' ฿</div>' : '';
    var noteText = r.note ? (typeof r.note==='object'?(th?r.note.th||r.note.en:r.note.en||r.note.th):r.note) : '';
    // Skip note if it's just repeating the numeric value already shown
    var noteIsRedundant = noteText && r.perDay && noteText.toString().replace(/[^0-9]/g,'')===r.perDay.toString();
    var condStr = (noteText && !noteIsRedundant) ?
      '<div style="font-size:10px;color:var(--amber);margin-top:2px">'+noteText+'</div>' : '';
    var fromFirstBadge = r.fromFirst ?
      '<span style="font-size:9px;background:rgba(105,240,174,.2);color:var(--green);padding:2px 6px;border-radius:10px;margin-left:4px">'+(th?'บาทแรก':'1st baht')+'</span>' : '';

    var lumpSumBadge = x.isLumpSum ? '<span style="font-size:9px;background:rgba(156,127,224,.25);color:var(--violet);padding:2px 6px;border-radius:10px;margin-left:4px">'+(th?'เหมาจ่าย':'Lump-sum')+'</span>' : '';
    var rowBg = x.isLumpSum ? 'rgba(156,127,224,.05)' : 'rgba(255,255,255,.04)';
    var rowBorder = x.isLumpSum ? 'rgba(156,127,224,.2)' : 'rgba(255,255,255,.08)';
    html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:'+rowBg+';border:1px solid '+rowBorder+';border-radius:12px;margin-bottom:8px">';
    // Insurer badge
    html += '<div style="width:36px;height:36px;border-radius:9px;background:'+x.color+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0">'+pol.insurer+'</div>';
    // Main info
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-size:11px;color:var(--t3);font-family:monospace">'+pol.no+'</div>';
    html += '<div style="font-size:12px;color:var(--t2)">'+r.name+fromFirstBadge+lumpSumBadge+'</div>';
    if(x.isLumpSum) html += '<div style="font-size:10px;color:var(--violet);margin-top:2px">'+(th?'ครอบคลุม ค่าห้อง+ผ่าตัด+ICU รวมกัน':'Covers room+surgery+ICU combined')+'</div>';
    html += dedStr + condStr;
    html += '</div>';
    // Value
    html += '<div style="text-align:right;flex-shrink:0">'+valStr+'</div>';
    html += '</div>';
  });

  return html;
}

// ── ALL POLICIES: compact cards ───────────────────────────────
function renderInsuranceAllPolicies(pols, th){
  var html = '';
  var yr2 = new Date().getFullYear();

  // Policy cards
  pols.forEach(function(pol){
    var ins = INSURERS_DEMO.find(function(i){return i.code===pol.insurer;});
    var insColor = ins ? ins.color : '#888';
    var pd2 = isPaid(pol.no, yr2);
    var imgs = POLICY_IMAGES[pol.no] || [];
    var legacyImg = pol.cardImage || CARD_IMAGES[pol.no];
    if(legacyImg && !imgs.length) imgs = [{id:'legacy',data:legacyImg,label:'card'}];

    var statusColor = pol.status==='active' ? 'var(--green)' : pol.status==='paid_up' ? 'var(--blue)' : 'var(--t3)';
    var statusLabel = pol.status==='active'?(th?'มีผลบังคับ':'Active'):pol.status==='paid_up'?(th?'ชำระครบ':'Paid-up'):(th?'หมดอายุ':'Expired');

    html += '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px;margin-bottom:10px">';

    // Urgent
    if(pol.urgent&&!pd2) html+='<div style="background:rgba(255,183,77,.12);border:1px solid rgba(255,183,77,.3);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:11px;color:var(--amber)">&#x23F0; '+pol.urgentMsg+'</div>';

    // Header row
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
    html+='<div style="width:36px;height:36px;border-radius:9px;background:'+insColor+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0">'+pol.insurer+'</div>';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="font-size:14px;font-weight:700;line-height:1.3">'+pol.name+'</div>';
    html+='<div style="font-size:10px;color:var(--t3);font-family:monospace">'+pol.no+'</div>';
    html+='</div>';
    html+='<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.07);color:'+statusColor+'">'+statusLabel+'</span>';
    html+='</div>';

    // Key info chips
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
    if(pol.sumAssured) html+='<div style="background:rgba(79,195,247,.1);border-radius:6px;padding:3px 8px;font-size:11px"><span style="color:var(--t3)">ทุน </span><span style="color:var(--blue);font-weight:600">'+fmtTHB(pol.sumAssured)+'</span></div>';
    if(pol.endDate) html+='<div style="background:rgba(255,255,255,.06);border-radius:6px;padding:3px 8px;font-size:11px"><span style="color:var(--t3)">'+(th?'ถึง ':'to ')+'</span><span style="font-weight:600">'+pol.endDate.substring(0,4)+'</span></div>';
    // Premium/payment chip
    // "Employer pays" only if genuinely free — not self-paid or has a premium amount
    var genuinelyFree = pol.freePolicy && !pol.selfPaid && !(pol.premium>0);
    if(genuinelyFree){
      html+='<div style="background:rgba(105,240,174,.1);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--green)">&#x1F3E2; '+(th?'นายจ้างจ่าย':'Employer pays')+'</div>';
    } else if(pol.premium>0){
      html+='<div style="background:'+(pd2?'rgba(105,240,174,.1)':'rgba(255,183,77,.1)')+';border-radius:6px;padding:3px 8px;font-size:11px">'+(pd2?'&#x2705; ':'&#x23F0; ')+'<span style="font-weight:600">'+fmtTHB(pol.premium)+'/ปี</span></div>';
    } else if(pol.status==='paid_up'){
      html+='<div style="background:rgba(79,195,247,.1);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--blue)">&#x2705; Paid-up</div>';
    }
    html+='</div>';

    // Top riders summary (key ones only — room, total, CI)
    var keyRiders = (pol.riders||[]).filter(function(r){
      return ['ipd_room_board','ipd_total','critical_illness_severe','daily_hospital_cash'].indexOf(r.cat)>=0;
    });
    if(keyRiders.length){
      html+='<div style="border-top:1px solid rgba(255,255,255,.07);padding-top:8px;margin-bottom:8px">';
      keyRiders.forEach(function(r){
        var val = r.perDay?r.perDay.toLocaleString()+(th?'/วัน':'/day'):r.amount?(r.amount>=10000?(r.amount/1000).toFixed(0)+'K':''+r.amount):'';
        html+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0">';
        html+='<span style="color:var(--t2)">'+r.name+'</span>';
        html+='<span style="color:var(--teal);font-weight:700">'+val+' ฿</span></div>';
        if(r.hasDeductible&&r.deductible) html+='<div style="font-size:10px;color:var(--red);padding-left:8px;margin-bottom:2px">&#x26A0; Ded. '+r.deductible.toLocaleString()+' ฿</div>';
      });
      // "Show all" link if there are more
      var totalRiders = (pol.riders||[]).length;
      if(totalRiders > keyRiders.length){
        html+='<div onclick="showAllRiders(\''+pol.no+'\')" style="font-size:11px;color:var(--blue);cursor:pointer;padding-top:4px">&#x25BC; '+(th?'สัญญาเพิ่มเติมทั้งหมด':'All riders')+' ('+totalRiders+')</div>';
      }
      html+='</div>';
    }

    // Photos thumbnails (multi-image)
    if(imgs.length){
      html+='<div style="display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px">';
      imgs.forEach(function(im,idx){
        html+='<div onclick="viewPolicyImage(\''+pol.no+'\','+idx+')" style="width:72px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:#0d0d1a">';
        html+='<img src="'+im.data+'" style="width:100%;height:100%;object-fit:cover">';
        html+='</div>';
      });
      // Add more button
      html+='<div onclick="uploadCardImage(\''+pol.no+'\')" style="width:52px;height:52px;border-radius:8px;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:18px">+</div>';
      html+='</div>';
    }

    // Footer
    html+='<div style="display:flex;gap:8px">';
    html+='<button class="btn btn-secondary" onclick="editPolicy(&quot;'+pol.no+'&quot;)" style="flex:1;font-size:13px;padding:9px;font-weight:600">&#x270F;&#xFE0F; '+(th?'แก้ไข':'Edit')+'</button>';
    if(!imgs.length) html+='<button class="btn btn-secondary" onclick="uploadCardImage(&quot;'+pol.no+'&quot;)" style="font-size:15px;padding:9px 14px" title="'+(th?'เพิ่มรูปบัตร':'Add photo')+'">&#x1F4F7;</button>';
    html+='<button class="btn btn-secondary" onclick="confirmDeletePolicy(\''+pol.no+'\')" style="font-size:15px;padding:9px 12px;background:rgba(255,82,82,.08);border-color:rgba(255,82,82,.25);color:var(--red)" title="'+(th?'ลบกรมธรรม์':'Delete policy')+'">&#x1F5D1;</button>';
    html+='</div>';

    html+='</div>'; // card
  });

  return html;
}

// Show all riders in a modal
function showAllRiders(policyNo){
  var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
  if(!pol) return;
  var th = S.lang==='th';
  var html = '';
  var catLabel = {
    'ipd_room_board':th?'ค่าห้อง':'Room & Board',
    'ipd_total':th?'IPD เหมาจ่าย':'IPD Lump Sum',
    'ipd_medical':th?'ค่ารักษา':'Medical',
    'ipd_surgery':th?'ค่าผ่าตัด':'Surgery',
    'ipd_surgery_room':th?'ห้องผ่าตัด':'OR',
    'ipd_anesthesia':th?'ยาสลบ':'Anesthesia',
    'daily_hospital_cash':th?'ค่าชดเชยรายวัน':'Daily Cash',
    'opd_general':'OPD','opd_accident':th?'OPD อุบัติเหตุ':'ER',
    'opd_consult':th?'ค่าปรึกษา':'Consult','opd_lab':'Lab',
    'critical_illness_severe':th?'โรคร้ายแรง':'CI',
    'critical_illness_early':th?'CI ระยะเริ่มต้น':'CI Early',
    'critical_illness_cancer':th?'มะเร็ง':'Cancer',
    'accident_death':th?'เสียชีวิต/ทุพพลภาพ':'AD&D',
    'accident_medical':th?'ค่ารักษาอุบัติเหตุ':'Accident',
    'premium_waiver':th?'ยกเว้นเบี้ย':'Premium Waiver'
  };
  var cats = {};
  (pol.riders||[]).forEach(function(r){
    var c=r.cat||'other';
    if(!cats[c]) cats[c]=[];
    cats[c].push(r);
  });
  Object.keys(cats).forEach(function(cat){
    html+='<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px">'+(catLabel[cat]||cat)+'</div>';
    cats[cat].forEach(function(r){
      var val = r.perDay?r.perDay.toLocaleString()+(th?'/วัน':'/day'):r.amount?(r.amount>=10000?(r.amount/1000).toFixed(0)+'K ฿':''+r.amount+' ฿'):'';
      html+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.05)">';
      html+='<div><span style="color:'+(r.fromFirst?'var(--green)':'var(--red)')+'">&#x25CF;</span> <span style="color:var(--t2)">'+r.name+'</span>';
      if(r.hasDeductible&&r.deductible) html+='<div style="font-size:10px;color:var(--red);margin-left:14px">&#x26A0; Ded. '+r.deductible.toLocaleString()+' ฿</div>';
      if(r.note){var n=typeof r.note==='object'?(th?r.note.th:r.note.en):r.note; html+='<div style="font-size:10px;color:var(--amber);margin-left:14px">'+n+'</div>';}
      html+='</div><div style="color:var(--teal);font-weight:700;white-space:nowrap">'+val+'</div></div>';
    });
  });
  openModal(pol.name, html);
}

function deletePolicyImage(policyNo, idx){
  var imgs = POLICY_IMAGES[policyNo] || [];
  var legacyImg = (POLICIES_DEMO.find(function(p){return p.no===policyNo;})||{}).cardImage || CARD_IMAGES[policyNo];
  if(legacyImg && !imgs.length) imgs = [{id:'legacy',data:legacyImg,label:'card'}];
  if(!imgs[idx]) return;
  var th = S.lang==='th';
  var imgToDelete = imgs[idx];
  // Delete from DB — handle both storage paths
  if(sbAuth){
    if(imgToDelete.id && imgToDelete.id!=='legacy'){
      // Delete from policy_images table (new multi-image system)
      getDbClient().from('policy_images').delete().eq('id', imgToDelete.id).then(function(res){
        if(res.error) console.error('Delete policy_image error:', res.error.message);
      });
    }
    // Also clear card_image_url on the insurance_policies row (legacy single-image field)
    // Do this always — belt-and-suspenders so image can't come back on reload
    getDbClient().from('insurance_policies')
      .update({card_image_url: null, updated_at: new Date().toISOString()})
      .eq('policy_number', policyNo)
      .then(function(res){
        if(res.error) console.error('Clear card_image_url error:', res.error.message);
        else console.log('card_image_url cleared for', policyNo);
      });
  }
  // Remove from memory
  imgs.splice(idx, 1);
  if(!imgs.length){
    delete POLICY_IMAGES[policyNo];
    delete CARD_IMAGES[policyNo];
    var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
    if(pol) delete pol.cardImage;
  }
  closeModalForce();
  toast(th?'ลบรูปแล้ว ✓':'Photo deleted ✓');
  renderInsurance();
}

function openModal(title, body){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;

}
function closeModal(e){
  if(e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').className = '';
}

  document.getElementById('modal').className = '';
}

function saveEditPolicyFull(policyNo){
  var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
  if(!pol) return;
  pol.name     = document.getElementById('ep-name').value;
  pol.insurer  = document.getElementById('ep-ins').value;
  pol.holder   = document.getElementById('ep-holder').value;
  pol.cat      = document.getElementById('ep-cat').value;
  pol.startDate= document.getElementById('ep-start').value;
  pol.endDate  = document.getElementById('ep-end').value;
  pol.sumAssured= parseFmtInput('ep-sum')||null;
  pol.premium  = parseFmtInput('ep-prem')||0;
  pol.dueMonth = parseInt(document.getElementById('ep-due').value)||null;
  pol.status   = document.getElementById('ep-status').value;
  pol.selfPaid = document.getElementById('ep-self').checked;
  pol.note     = document.getElementById('ep-notes').value;
  closeModalForce();
  if(!S.demo && sbAuth){
    saveInsurancePolicyToDB(pol).then(function(ok){
      toast(ok ? (S.lang==='th'?'บันทึกลง DB แล้ว ✓':'Saved to DB ✓') : (S.lang==='th'?'บันทึกไม่สำเร็จ กรุณาลองใหม่':'Save failed — please retry'));
      renderInsurance();
    });
  } else {
    toast(S.lang==='th'?'บันทึกแล้ว ✓':'Saved ✓');
    renderInsurance();
  }
}

function confirmDeletePolicy(policyNo){
  var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
  if(!pol) return;
  var th = S.lang==='th';
  showDeleteConfirm(
    th?'ลบกรมธรรม์?':'Delete Policy?',
    (th?'"'+pol.name+'" ('+policyNo+')<br><small style="color:var(--red)">ลบสัญญาเพิ่มเติมทั้งหมดด้วย ไม่สามารถกู้คืน</small>'
       :'"'+pol.name+'" ('+policyNo+')<br><small style="color:var(--red)">All riders deleted. Cannot undo.</small>'),
    'deletePolicy(\''+policyNo+'\')');
}

function deletePolicy(policyNo){
  var th = S.lang==='th';
  var idx = POLICIES_DEMO.findIndex(function(p){return p.no===policyNo;});
  if(idx<0) return;
  POLICIES_DEMO.splice(idx,1);
  // Delete from DB
  if(!S.demo && sbAuth){
    (async function(){
      try {
        var db = getDbClient();
        // Delete riders first (FK), then policy
        var {data:polRow} = await db.from('insurance_policies').select('id').eq('policy_number',policyNo).single();
        if(polRow){
          await db.from('policy_riders').delete().eq('policy_id',polRow.id);
          await db.from('insurance_policies').delete().eq('id',polRow.id);
        }
      } catch(e){ console.warn('deletePolicy DB:', e); }
    })();
  }
  closeModalForce();
  toast(th?'ลบกรมธรรม์แล้ว':'Policy deleted');
  renderInsurance();
}

// ── RIDER INLINE EDIT ─────────────────────────────────────────
function toggleRiderEdit(policyNo, idx){
  // Use querySelector with CSS.escape-safe selector
  var escapedId = 'rider-edit-'+policyNo+'-'+idx;
  var panel = document.getElementById(escapedId);
  if(!panel){
    // Fallback: search by data-rider attribute in modal-body
    var panels = document.querySelectorAll('[data-rider-edit]');
    panels.forEach(function(el){
      if(el.getAttribute('data-rider-edit') === policyNo+'-'+idx) panel = el;
    });
  }
  if(!panel) return;
  panel.style.display = (panel.style.display==='none'||panel.style.display==='') ? 'block' : 'none';
}

  var row = document.getElementById('rider-row-'+policyNo+'-'+idx);
  if(!row) return;
  // Could enhance visually here if needed
}

function saveRiderEdit(policyNo, idx){
  var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
  if(!pol||!pol.riders||!pol.riders[idx]) return;
  var th = S.lang==='th';

  var catEl   = document.getElementById('rider-cat-'+policyNo+'-'+idx);
  var nameEl  = document.getElementById('rider-name-'+policyNo+'-'+idx);
  var amtEl   = document.getElementById('rider-amt-'+policyNo+'-'+idx);
  var pdEl    = document.getElementById('rider-pd-'+policyNo+'-'+idx);
  var dedEl   = document.getElementById('rider-ded-'+policyNo+'-'+idx);
  var firstEl = document.getElementById('rider-first-'+policyNo+'-'+idx);
  if(!catEl||!nameEl) return;

  var oldCat = pol.riders[idx].cat;
  pol.riders[idx].cat        = catEl.value;
  pol.riders[idx].name       = nameEl.value.trim() || pol.riders[idx].name;
  pol.riders[idx].amount     = parseFmtInput('rider-amt-'+policyNo+'-'+idx) || null;
  pol.riders[idx].perDay     = parseFmtInput('rider-pd-'+policyNo+'-'+idx) || null;
  pol.riders[idx].deductible = parseFmtInput('rider-ded-'+policyNo+'-'+idx) || 0;
  pol.riders[idx].hasDeductible = pol.riders[idx].deductible > 0;
  pol.riders[idx].fromFirst  = firstEl ? firstEl.checked : pol.riders[idx].fromFirst;

  // Persist to DB if connected
  if(!S.demo && sbAuth){
    (async function(){
      try {
        var db = getDbClient();
        var {data:polRow} = await db.from('insurance_policies').select('id').eq('policy_number',policyNo).single();
        if(polRow){
          await db.from('policy_riders')
            .update({
              rider_category: pol.riders[idx].cat,
              rider_name: pol.riders[idx].name,
              coverage_amount: pol.riders[idx].amount,
              per_day: pol.riders[idx].perDay,
              deductible_amount: pol.riders[idx].deductible||null,
              has_deductible: pol.riders[idx].hasDeductible,
              covers_from_first_baht: pol.riders[idx].fromFirst
            })
            .eq('policy_id', polRow.id)
            .eq('rider_name', nameEl.value.trim() || pol.riders[idx].name);
        }
      } catch(e){ console.warn('saveRiderEdit DB:', e); }
    })();
  }

  var catChanged = oldCat !== pol.riders[idx].cat;
  toast(th ? (catChanged?'เปลี่ยนประเภทและบันทึกแล้ว ✓':'บันทึกแล้ว ✓') : (catChanged?'Category updated ✓':'Saved ✓'));
  editPolicy(policyNo); // refresh modal to show new badge
}

function deleteRider(policyNo, riderIdx, rider){
  var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
  if(!pol||!pol.riders) return;
  var th = S.lang==='th';

var HOSP_CARDS = [];  // [{id, title, hospital, cardNo, notes, image, profileId}]

// Load standalone hospital cards from DB on login
async function loadHospitalCardsFromDB(){
  if(!sbAuth || S.demo) return;
  try {
    var db = getDbClient();
    if(!db) return;
    var uid = (await sbAuth.auth.getUser()).data.user.id;
    var { data, error } = await db.from('hospital_cards')
      .select('*')
      .eq('owner_id', uid)
      .is('policy_id', null)
      .order('sort_order');
    if(error || !data) return;
    HOSP_CARDS = data.map(function(r){
      return {
        dbId: r.id, title: r.card_title, hospital: r.hospital_name||'',
        cardNo: r.card_number||'', notes: r.notes||'',
        image: r.card_image_url||null, profileId: r.profile_id||null
      };
    });
    console.log('Loaded', HOSP_CARDS.length, 'standalone hospital cards');
  } catch(e){ console.warn('loadHospitalCardsFromDB:', e); }
}

// ── Crop support for hospital card photos ────────────────────
var _hcCropState = { img:null, sx:0, sy:0, sw:0, sh:0, dragging:false, resizing:false, handle:'', startX:0, startY:0, origBox:{} };

function hcPreviewCrop(input){
  var file = input.files[0]; if(!file) return;
  var wrap = document.getElementById('hc2-crop-wrap');
  var canvas = document.getElementById('hc2-canvas');
  if(!wrap || !canvas) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      _hcCropState.img = img;
      var maxW = canvas.parentElement.clientWidth || 320;
      var scale = maxW / img.width;
      canvas.width  = img.width;
      canvas.height = img.height;
      canvas.style.height = Math.round(img.height * scale)+'px';
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      // Default crop box = full image with 10% padding
      var pad = Math.round(Math.min(img.width, img.height) * 0.05);
      _hcCropState.sx = pad; _hcCropState.sy = pad;
      _hcCropState.sw = img.width - pad*2; _hcCropState.sh = img.height - pad*2;
      hcDrawCropBox();
      wrap.style.display = 'block';
      // Touch/mouse events for dragging crop box
      canvas.onmousedown = hcCropStart; canvas.onmousemove = hcCropMove; canvas.onmouseup = hcCropEnd;
      canvas.ontouchstart = function(ev){ hcCropStart(ev.touches[0]); ev.preventDefault(); };
      canvas.ontouchmove  = function(ev){ hcCropMove(ev.touches[0]);  ev.preventDefault(); };
      canvas.ontouchend   = hcCropEnd;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function hcDrawCropBox(){
  var canvas = document.getElementById('hc2-canvas');
  var box    = document.getElementById('hc2-crop-box');
  if(!canvas || !box) return;
  var rect = canvas.getBoundingClientRect();
  var scaleX = rect.width  / canvas.width;
  var scaleY = rect.height / canvas.height;
  var s = _hcCropState;
  box.style.left   = Math.round(s.sx * scaleX)+'px';
  box.style.top    = Math.round(s.sy * scaleY)+'px';
  box.style.width  = Math.round(s.sw * scaleX)+'px';
  box.style.height = Math.round(s.sh * scaleY)+'px';
}

function hcCropStart(ev){
  var canvas = document.getElementById('hc2-canvas');
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width  / rect.width;
  var scaleY = canvas.height / rect.height;
  var mx = (ev.clientX - rect.left) * scaleX;
  var my = (ev.clientY - rect.top)  * scaleY;
  var s = _hcCropState;
  s.startX = mx; s.startY = my;
  s.origBox = {sx:s.sx, sy:s.sy, sw:s.sw, sh:s.sh};
  // Check if inside box → drag; else → new box
  if(mx>=s.sx && mx<=s.sx+s.sw && my>=s.sy && my<=s.sy+s.sh){
    s.dragging = true;
  } else {
    s.sx=mx; s.sy=my; s.sw=1; s.sh=1; s.dragging=false; s.resizing=true;
  }
}
function hcCropMove(ev){
  var canvas = document.getElementById('hc2-canvas');
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width  / rect.width;
  var scaleY = canvas.height / rect.height;
  var mx = (ev.clientX - rect.left) * scaleX;
  var my = (ev.clientY - rect.top)  * scaleY;
  var s = _hcCropState;
  var dx = mx - s.startX, dy = my - s.startY;
  if(s.dragging){
    s.sx = Math.max(0, Math.min(s.origBox.sx + dx, canvas.width  - s.sw));
    s.sy = Math.max(0, Math.min(s.origBox.sy + dy, canvas.height - s.sh));
  } else if(s.resizing){
    s.sw = Math.max(20, Math.min(mx - s.sx, canvas.width  - s.sx));
    s.sh = Math.max(20, Math.min(my - s.sy, canvas.height - s.sy));
  }
  hcDrawCropBox();
}
function hcCropEnd(){ _hcCropState.dragging = false; _hcCropState.resizing = false; }

function hcApplyCrop(){
  var s = _hcCropState;
  if(!s.img) return;
  var out = document.createElement('canvas');
  out.width = s.sw; out.height = s.sh;
  out.getContext('2d').drawImage(s.img, s.sx, s.sy, s.sw, s.sh, 0, 0, s.sw, s.sh);
  document.getElementById('hc2-result-data').value = out.toDataURL('image/jpeg', 0.85);
  document.getElementById('hc2-crop-wrap').style.display = 'none';
  toast(S.lang==='th'?'ตัดรูปแล้ว ✓':'Cropped ✓');
}
function hcSkipCrop(){
  // Use full image as-is
  var s = _hcCropState;
  if(!s.img) return;
  var out = document.createElement('canvas');
  out.width = s.img.width; out.height = s.img.height;
  out.getContext('2d').drawImage(s.img, 0, 0);
  document.getElementById('hc2-result-data').value = out.toDataURL('image/jpeg', 0.85);
  document.getElementById('hc2-crop-wrap').style.display = 'none';
  toast(S.lang==='th'?'ใช้รูปเต็ม ✓':'Full image used ✓');
}

async function saveStandaloneCard(editIdx){
  var th = S.lang==='th';
  var isEdit = (editIdx !== null && editIdx !== undefined);
  var title    = (document.getElementById('hc2-title').value||'').trim();
  var hospital = (document.getElementById('hc2-hospital').value||'').trim();
  var cardNo   = (document.getElementById('hc2-cardno').value||'').trim();
  var notes    = (document.getElementById('hc2-notes').value||'').trim();
  var profileId= document.getElementById('hc2-profile').value || null;
  var resultData = (document.getElementById('hc2-result-data').value||'').trim();
  var photoFile  = document.getElementById('hc2-photo').files[0];

  if(!title){ toast(th?'กรุณากรอกชื่อบัตร':'Please enter card title'); return; }

  // Step 1: determine the immediate preview image (dataURL or objectURL)
  var previewUrl = isEdit ? (HOSP_CARDS[editIdx].image||null) : null;
  if(resultData) previewUrl = resultData;
  else if(photoFile) previewUrl = URL.createObjectURL(photoFile);

  // Step 2: save with preview immediately so thumbnail shows right away
  var card = { title:title, hospital:hospital, cardNo:cardNo||'', notes:notes||'', image:previewUrl, profileId:profileId||null };
  if(isEdit) card.dbId = HOSP_CARDS[editIdx].dbId;
  if(isEdit){ HOSP_CARDS[editIdx] = card; } else { HOSP_CARDS.push(card); }

  closeModalForce();
  toast(th?'บันทึกแล้ว ✓':'Saved ✓');
  renderInsurance(); // render immediately with preview thumbnail

  // Step 3: async upload to Supabase Storage in background, then update DB URL
  (async function(){
    var finalUrl = previewUrl; // default = keep preview (dataURL or objectURL)
    var sourceBlob = null;

    if(resultData){
      // cropped canvas → blob
      try { sourceBlob = await (await fetch(resultData)).blob(); } catch(e){}
    } else if(photoFile){
      sourceBlob = photoFile;
    }

    if(sourceBlob && !S.demo && sbAuth){
      try {
        var ext = (resultData || (photoFile&&photoFile.type==='image/png')) ? 'jpg' : 'jpg';
        var fn = 'hcard_'+Date.now()+'.'+ext;
        var { data: upData } = await sbAuth.storage.from('policy-images').upload(fn, sourceBlob, {contentType:'image/jpeg', upsert:true});
        if(upData){
          var { data: urlData } = sbAuth.storage.from('policy-images').getPublicUrl(fn);
          if(urlData && urlData.publicUrl) finalUrl = urlData.publicUrl;
        }
      } catch(e){ console.warn('hcard upload:', e); }
    }

    // Update the card's image with final URL
    var cardRef = isEdit ? HOSP_CARDS[editIdx] : HOSP_CARDS[HOSP_CARDS.length-1];
    if(cardRef) cardRef.image = finalUrl;

    // Persist to DB
    if(!S.demo && sbAuth){
      try {
        var db = getDbClient();
        if(!db) return;
        var uid = (await sbAuth.auth.getUser()).data.user.id;
        var row = {
          owner_id: uid, policy_id: null, profile_id: profileId||null,
          card_title: title, hospital_name: hospital||null,
          card_number: cardNo||null, notes: notes||null,
          card_image_url: finalUrl||null
        };
        if(isEdit && card.dbId){
          await db.from('hospital_cards').update(row).eq('id', card.dbId);
        } else {
          var { data: ins } = await db.from('hospital_cards').insert(row).select('id').single();
          if(ins && cardRef) cardRef.dbId = ins.id;
        }
      } catch(e){ console.warn('saveStandaloneCard DB:', e); }
    }
    // Re-render only if image URL changed (public URL replaced dataURL)
    if(finalUrl !== previewUrl) renderInsurance();
  })();
}

function saveNewRider(policyNo){
  var pol = POLICIES_DEMO.find(function(p){return p.no===policyNo;});
  if(!pol) return;
  if(!pol.riders) pol.riders=[];
  var ded = parseFmtInput('nr-ded');
  var r = {
    name:   document.getElementById('nr-name').value,
    cat:    document.getElementById('nr-cat').value,
    amount: parseFmtInput('nr-amount')||null,
    perDay: parseFmtInput('nr-perday')||null,
    deductible: ded, hasDeductible: ded>0,
    fromFirst: document.getElementById('nr-first').checked,
    note: document.getElementById('nr-note').value||null
  };
  if(!r.name){ toast(S.lang==='th'?'กรุณากรอกชื่อสัญญา':'Please enter rider name'); return; }
  pol.riders.push(r);

  // ── Save to DB ──────────────────────────────────────────
  if(!S.demo && sbAuth){
    (async function(){
      try {
        var db = getDbClient();
        if(!db) return;
        // Look up the DB UUID for this policy by policy_number
        var { data: polRow, error: polErr } = await db
          .from('insurance_policies')
          .select('id')
          .eq('policy_number', policyNo)
          .single();
        if(polErr || !polRow){
          console.warn('saveNewRider: policy not found in DB for', policyNo);
          return;
        }
        var { error: rErr } = await db.from('policy_riders').insert({
          policy_id:            polRow.id,
          rider_name:           r.name,
          rider_category:       r.cat,
          rider_code:           null,
          coverage_amount:      r.amount || null,
          per_day:              r.perDay || null,
          coverage_per_day:     r.perDay || null,
          covers_from_first_baht: r.fromFirst,
          has_deductible:       r.hasDeductible,
          deductible_amount:    r.deductible || null,
          coverage_notes:       r.note || null,
          is_active:            true
        });
        if(rErr) console.warn('saveNewRider DB insert error:', rErr);
        else console.log('Rider saved to DB for policy', policyNo);
      } catch(e){ console.warn('saveNewRider DB error:', e); }
    })();
  }

  closeModalForce();
  toast(S.lang==='th'?'เพิ่มสัญญาเพิ่มเติมแล้ว ✓':'Rider added ✓');
  editPolicy(policyNo);
}

      html += '<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<span style="font-size:12px;color:var(--t2)"><span style="color:'+(r.fromFirst?'var(--green)':'var(--amber)')+';font-size:10px">&#x25CF;</span> <b>'+r.insurer+'</b> <span style="color:var(--t3);font-size:11px">'+r.rName+'</span></span>';
      html += '<span style="font-size:13px;font-weight:700;color:var(--teal)">'+r.val+'</span></div>';
      if(!r.fromFirst&&r.ded) html += '<div style="font-size:10px;color:var(--red);padding-left:12px">&#x26A0; Deductible '+r.ded.toLocaleString()+' \u0e3f</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  // บัตรหาหมอ (standalone, filtered by profile)
  openModal(th?'สรุปความคุ้มครอง':'Coverage Summary', html);
}


function openIPDWorkflow(){
  var covId = (S.insFilter!=='all') ? S.insFilter : S.pid;
  var p = prof(covId);
  var th = S.lang==='th';
  var advice = getIPDAdvice ? getIPDAdvice(p.dbId) : {useFirst:[],useSecond:[],dailyCash:[]};

  var html = '<div style="font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px">&#x1F916; '+p.name+' — '+(th?'แผนการใช้ประกัน IPD':'IPD Insurance Plan')+'</div>';

  // ── STEP 1: From 1st baht — grouped by policy (same style as Step 2)
  if(advice.useFirst&&advice.useFirst.length){
    html += '<div style="font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px">&#x2705; '+(th?'ขั้นตอนที่ 1 — ใช้ก่อน (ตั้งแต่บาทแรก)':'Step 1 — Use first (from 1st baht)')+'</div>';
    var s1g={};
    advice.useFirst.forEach(function(x){
      if(!s1g[x.pol.no]) s1g[x.pol.no]={pol:x.pol,riders:[]};
      s1g[x.pol.no].riders.push(x.rider);
    });
    Object.keys(s1g).forEach(function(key){
      var g=s1g[key];
      html += '<div style="background:rgba(79,195,247,.07);border:1px solid rgba(79,195,247,.22);border-radius:12px;padding:10px 12px;margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
      html += '<span style="background:rgba(79,195,247,.2);color:var(--blue);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">'+g.pol.insurer+'</span>';
      html += '<b style="font-size:13px">'+g.pol.no+'</b>';
      html += '<span style="font-size:11px;color:var(--t3)">'+g.pol.name+'</span>';
      html += '</div>';
      g.riders.forEach(function(r){
        var val = r.perDay ? r.perDay.toLocaleString()+(th?'/วัน':'/day') : r.amount ? r.amount.toLocaleString()+' ฿' : '';
        html+='<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t2);padding:2px 0 2px 4px">&#x25CF; '+r.name+'<span style="color:var(--teal);font-weight:700">'+val+'</span></div>';
      });
      html += '</div>';
    });
  }

  // ── DAILY CASH: always collect alongside Step 1
  if(advice.dailyCash&&advice.dailyCash.length){
    html += '<div style="font-size:12px;font-weight:700;color:var(--teal);margin:8px 0 5px">&#x1F4B5; '+(th?'ค่าชดเชยรายวัน (เบิกเพิ่มได้)':'Daily Cash Benefit')+'</div>';
    advice.dailyCash.forEach(function(x){
      html += '<div style="background:rgba(38,217,176,.07);border:1px solid rgba(38,217,176,.18);border-radius:10px;padding:7px 11px;margin-bottom:6px;font-size:12px">';
      html += '<b>'+x.pol.insurer+' '+x.pol.no+'</b> — '+x.rider.name;
      html += ' <span style="color:var(--teal);font-weight:700">'+x.rider.perDay.toLocaleString()+' ฿/วัน</span>';
      html += '</div>';
    });
  }

  // ── STEP 2: After deductible — grouped by policy (existing style, unchanged)
  if(advice.useSecond&&advice.useSecond.length){
    html += '<div style="font-size:12px;font-weight:700;color:var(--t1);margin:10px 0 6px">&#x26A0;&#xFE0F; '+(th?'ขั้นตอนที่ 2 — หลังครบ Deductible':'Step 2 — After deductible')+'</div>';
    var s2g={};
    advice.useSecond.forEach(function(x){
      if(!s2g[x.pol.no]) s2g[x.pol.no]={pol:x.pol,riders:[],minDed:x.rider.deductible||999999};
      s2g[x.pol.no].riders.push(x.rider);
      if((x.rider.deductible||999999)<s2g[x.pol.no].minDed) s2g[x.pol.no].minDed=x.rider.deductible||999999;
    });
    Object.keys(s2g).sort(function(a,b){return s2g[a].minDed-s2g[b].minDed;}).forEach(function(key){
      var g=s2g[key],ded=g.minDed<999999?g.minDed:null;
      html += '<div style="background:rgba(255,183,77,.07);border:1px solid rgba(255,183,77,.25);border-radius:12px;padding:10px 12px;margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
      html += '<span style="background:rgba(255,183,77,.2);color:var(--amber);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">'+g.pol.insurer+'</span>';
      html += '<b style="font-size:13px">'+g.pol.no+'</b>';
      if(ded) html += '<span style="font-size:10px;background:rgba(255,82,82,.2);color:var(--red);padding:2px 7px;border-radius:20px">Ded. '+ded.toLocaleString()+' ฿</span>';
      html += '</div>';
      g.riders.forEach(function(r){html+='<div style="font-size:12px;color:var(--t2);padding:2px 0 2px 4px">• '+r.name+'</div>';});
      if(ded) html += '<div style="font-size:11px;color:var(--red);margin-top:5px">➡️ '+(th?'ต้องจ่ายส่วนแรก '+ded.toLocaleString()+' ฿':'Pay '+ded.toLocaleString()+' ฿ first')+'</div>';
      html += '</div>';
    });
  }

  if(!advice.useFirst.length&&!advice.useSecond.length){
    html += '<div style="color:var(--t2);font-size:13px;text-align:center;padding:16px 0">'+(th?'ไม่พบความคุ้มครอง IPD สำหรับโปรไฟล์นี้':'No IPD coverage found for this profile')+'</div>';
  }
  openModal(th?'ขั้นตอนการเบิก IPD':'IPD Claim Workflow', html);
}


function addInsuranceHTML(){
  var th = S.lang==='th';
  var html = '<div style="font-size:13px;color:var(--t2);margin-bottom:14px">'+(th?'เพิ่มกรมธรรม์ใหม่':'Add a new insurance policy')+'</div>';
  html += '<div class="fg"><label class="lbl">'+(th?'ชื่อกรมธรรม์':'Policy Name')+'</label><input id="np-name" class="inp" placeholder="e.g. AIA Health Care"></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html += '<div class="fg"><label class="lbl">'+(th?'เลขกรมธรรม์':'Policy No.')+'</label><input id="np-no" class="inp"></div>';
  html += '<div class="fg"><label class="lbl">'+(th?'บริษัทประกัน':'Insurer')+'</label><select id="np-ins" class="inp" onchange="onInsurerChange(this)">';
  getAllInsurers().forEach(function(ins){ html+='<option value="'+ins.code+'">'+ins.code+' — '+ins.name+'</option>'; });
  html += '<option value="__custom__">+ '+(th?'เพิ่มบริษัทใหม่...':'Add new insurer...')+'</option>';
  html += '</select></div>';+'</label><select id="np-holder" class="inp">';
  PROFILES.forEach(function(p){ html+='<option value="'+p.name+'">'+p.name+' ('+p.nick+')</option>'; });
  html += '</select></div>';
  html += '<div class="fg"><label class="lbl">'+(th?'เบี้ยประกัน/ปี (฿)':'Premium/yr')+'</label><input id="np-prem" class="inp" type="text" inputmode="numeric" oninput="fmtInputComma(this)" placeholder="0"></div>';
  html += '</div>';
  // Custom insurer name field (hidden by default)
  html += '<div id="np-custom-ins-row" class="fg" style="display:none"><label class="lbl">'+(th?'ชื่อบริษัทและรหัส (เช่น BUPA)':'Insurer code & name')+'</label>';
  html += '<div style="display:grid;grid-template-columns:1fr 2fr;gap:8px">';
  html += '<input id="np-custom-code" class="inp" placeholder="CODE" style="text-transform:uppercase">';
  html += '<input id="np-custom-name" class="inp" placeholder="'+(th?'ชื่อบริษัทประกัน':'Full insurer name')+'"></div></div>';
  html += '<div style="display:flex;gap:10px;margin-top:14px">';
  html += '<button class="btn btn-secondary" onclick="closeModalForce()" style="flex:1">'+(th?'ยกเลิก':'Cancel')+'</button>';
  html += '<button class="btn btn-primary" onclick="saveNewPolicy()" style="flex:2">'+(th?'บันทึกกรมธรรม์':'Save Policy')+'</button>';
  html += '</div>';
  return html;
}

// Show/hide custom insurer field when dropdown changes
function onInsurerChange(sel){
  var row = document.getElementById('np-custom-ins-row');
  if(row) row.style.display = sel.value==='__custom__' ? 'block' : 'none';
}

function saveNewPolicy(){
  var no = (document.getElementById('np-no').value||'').trim();
  var name = (document.getElementById('np-name').value||'').trim();
  if(!no||!name){ toast(S.lang==='th'?'กรุณากรอกชื่อและเลขกรมธรรม์':'Please fill name and policy number'); return; }
  if(POLICIES_DEMO.find(function(p){return p.no===no;})){ toast(S.lang==='th'?'เลขกรมธรรม์นี้มีอยู่แล้ว':'Policy number already exists'); return; }
  // 3.4: Handle custom insurer
  var insCode = document.getElementById('np-ins').value;
  if(insCode === '__custom__'){
    var customCode = (document.getElementById('np-custom-code').value||'').trim().toUpperCase();
    var customName = (document.getElementById('np-custom-name').value||'').trim();
    if(!customCode){ toast(S.lang==='th'?'กรุณากรอกรหัสบริษัท':'Please enter insurer code'); return; }
    insCode = customCode;
    // Add to custom list if not already there
    if(!getAllInsurers().find(function(i){return i.code===customCode;})){
      CUSTOM_INSURERS.push({code:customCode, name:customName||customCode, color:'#888', hotline:''});
    }
  }
  var pol = {
    no:no, name:name, insurer:insCode,
    holder:document.getElementById('np-holder').value, cat:'health',
    status:'active', premium:parseFmtInput('np-prem')||0,
    selfPaid:true, riders:[], hospital_cards:[]
  };
  // 3.4: บัตรหาหมอ type gets card policy
  if(insCode === 'HOSPITAL') pol.cat = 'card';
  POLICIES_DEMO.push(pol);
  closeModalForce();
  if(!S.demo&&sbAuth) saveInsurancePolicyToDB(pol).then(function(ok){ toast(ok?'บันทึกลง DB ✓':'บันทึกในเครื่อง'); });
  else toast(S.lang==='th'?'เพิ่มกรมธรรม์แล้ว ✓':'Policy added ✓');
  renderInsurance();
}

// ── APP INIT ──────────────────────────────────────────────────
function initApp(){
  // Populate version
  var vn = document.getElementById('v-num');
  var vd = document.getElementById('v-date');
  if(vn) vn.textContent = APP_VERSION;
  if(vd) vd.textContent = APP_DATE;

  // Show auth, hide app
  var authEl = document.getElementById('auth-screen');
  var appEl  = document.getElementById('app');
  if(authEl) authEl.style.display='flex';
  if(appEl)  appEl.style.display='none';

  switchTab('dashboard');

  // Try auto-login from existing Supabase session
  waitForSupabase(function(ok){
    if(!ok) return;
    sbAuth.auth.getSession().then(function(res){
      if(res.data&&res.data.session){
        S.demo=false;
        if(authEl) authEl.style.display='none';
        if(appEl)  appEl.style.display='flex';
        loadAllDataFromDB();
        loadPolicyImagesFromDB();
        renderTab(S.tab);
        toast('เชื่อมต่อ DB แล้ว ✓');
      }
    });
  });
}
window.onload = initApp;
