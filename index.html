<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>HealthVault v2.8.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --card: rgba(255,255,255,0.06);
  --card2: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.16);
  --t1: #f0f0f5;
  --t2: #a0a0b5;
  --t3: #606070;
  --blue: #4fc3f7;
  --teal: #26d7b3;
  --green: #4ade80;
  --red: #f87171;
  --amber: #fbbf24;
  --purple: #c084fc;
  --pink: #f472b6;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }
body { display: flex; flex-direction: column; overflow: hidden; height: 100dvh; }

/* ── HEADER ── */
#app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding-top: max(14px, env(safe-area-inset-top));
}
#header-left { display: flex; flex-direction: column; }
#header-title { font-size: 17px; font-weight: 700; color: var(--t1); }
#header-sub { font-size: 11px; color: var(--t3); margin-top: 1px; }
#header-right { display: flex; gap: 8px; align-items: center; }
.hdr-btn {
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--t2); font-size: 12px; font-weight: 600;
  padding: 5px 10px; border-radius: 8px; cursor: pointer;
}
#profile-pill {
  background: linear-gradient(135deg, var(--blue), var(--teal));
  color: #000; font-size: 12px; font-weight: 700;
  padding: 5px 10px; border-radius: 8px; cursor: pointer;
  white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
}

/* ── TABS ── */
#tab-bar {
  display: flex; background: rgba(10,10,15,0.97);
  border-top: 1px solid var(--border);
  flex-shrink: 0; overflow-x: auto;
  scrollbar-width: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  padding-bottom: env(safe-area-inset-bottom);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
#tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: 56px; padding: 10px 4px 8px;
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 10px; color: var(--t3); transition: color .2s; position: relative;
}
.tab-btn .icon { font-size: 18px; }
.tab-btn.active { color: var(--blue); }
.tab-btn.active::after {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: var(--blue); border-radius: 0 0 2px 2px;
}

/* ── CONTENT ── */
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.tab-pane { display: none; padding: 12px 14px calc(80px + env(safe-area-inset-bottom)); }
.tab-pane.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.card2 { background: var(--card2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.section-title { font-size: 12px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .08em; margin: 16px 0 8px; }

/* ── GLASS BUTTONS ── */
.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--teal));
  color: #000; font-weight: 700; border: none; border-radius: var(--radius-sm);
  padding: 12px 20px; font-size: 14px; cursor: pointer; width: 100%;
}
.btn-glass {
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--t2); font-size: 13px; padding: 9px 16px;
  border-radius: var(--radius-sm); cursor: pointer;
}
.btn-danger { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.25); color: var(--red); font-size: 13px; padding: 9px 16px; border-radius: var(--radius-sm); cursor: pointer; }

/* ── INPUTS ── */
.field-group { margin-bottom: 12px; }
.field-group label { font-size: 12px; color: var(--t3); display: block; margin-bottom: 5px; }
.field-group input, .field-group select, .field-group textarea {
  width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--t1); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px;
}
.field-group textarea { resize: vertical; min-height: 70px; }
.field-group select option { background: #1a1a2e; }

/* ── BADGES ── */
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }
.badge-green { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid rgba(74,222,128,.25); }
.badge-red { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
.badge-amber { background: rgba(251,191,36,.15); color: var(--amber); border: 1px solid rgba(251,191,36,.25); }
.badge-blue { background: rgba(79,195,247,.15); color: var(--blue); border: 1px solid rgba(79,195,247,.25); }
.badge-teal { background: rgba(38,215,179,.15); color: var(--teal); border: 1px solid rgba(38,215,179,.25); }
.badge-purple { background: rgba(192,132,252,.15); color: var(--purple); border: 1px solid rgba(192,132,252,.25); }

/* ── MODAL ── */
#modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  align-items: flex-end; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: #141420; border: 1px solid var(--border2);
  border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh;
  overflow-y: auto; padding: 0 0 max(20px, env(safe-area-inset-bottom));
}
#modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
#modal-head { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
#modal-title { font-size: 16px; font-weight: 700; }
#modal-close { background: none; border: none; color: var(--t3); font-size: 20px; cursor: pointer; padding: 4px; }
#modal-body { padding: 14px 16px; }

/* ── FULLSCREEN IMAGE VIEWER ── */
#img-viewer {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: #000; align-items: center; justify-content: center;
}
#img-viewer.open { display: flex; }
#img-viewer img { max-width: 100%; max-height: 100%; object-fit: contain; touch-action: manipulation; }
#img-viewer-close { position: absolute; top: max(16px, env(safe-area-inset-top)); right: 16px; color: #fff; font-size: 28px; background: rgba(0,0,0,.5); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
#img-nav-prev, #img-nav-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 20px; padding: 12px; border-radius: 50%; cursor: pointer; }
#img-nav-prev { left: 12px; }
#img-nav-next { right: 12px; }
#img-counter { position: absolute; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.6); font-size: 13px; background: rgba(0,0,0,.4); padding: 4px 12px; border-radius: 12px; }

/* ── TOAST ── */
#toast { position: fixed; bottom: max(80px, calc(env(safe-area-inset-bottom) + 70px)); left: 50%; transform: translateX(-50%); background: rgba(20,20,30,.95); border: 1px solid var(--border2); color: var(--t1); padding: 10px 18px; border-radius: 12px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; }

/* ── LOGIN ── */
#login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.login-card { width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--border2); border-radius: 20px; padding: 28px 24px; }
.login-logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
.login-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--t3); text-align: center; margin-bottom: 24px; }

/* ── DASHBOARD ── */
.hero-card { background: linear-gradient(135deg, rgba(79,195,247,.15), rgba(38,215,179,.1)); border: 1px solid rgba(79,195,247,.2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.hero-name { font-size: 22px; font-weight: 800; }
.hero-meta { font-size: 12px; color: var(--t2); margin-top: 2px; }
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.metric-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 12px; }
.metric-label { font-size: 11px; color: var(--t3); margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 800; }
.metric-delta { font-size: 11px; margin-top: 2px; }
.alert-row { display: flex; gap: 8px; align-items: flex-start; padding: 10px; background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.15); border-radius: 10px; margin-bottom: 6px; }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-text { font-size: 13px; color: var(--t2); }
.alert-text strong { color: var(--t1); }

/* ── HEALTH RECORDS ── */
.year-selector { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.year-selector::-webkit-scrollbar { display: none; }
.year-btn { flex-shrink: 0; background: var(--glass); border: 1px solid var(--glass-border); color: var(--t2); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
.year-btn.active { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 700; }

.record-cat { margin-bottom: 16px; }
.record-cat-title { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.record-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.record-name { font-size: 13px; color: var(--t2); }
.record-val-block { text-align: right; }
.record-value { font-size: 14px; font-weight: 700; }
.record-unit { font-size: 10px; color: var(--t3); }
.record-range { font-size: 10px; color: var(--t3); margin-top: 1px; }

/* ── INSURANCE ── */
.ins-situation-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; margin-bottom: 12px; }
.ins-situation-tabs::-webkit-scrollbar { display: none; }
.sit-btn { flex-shrink: 0; background: var(--glass); border: 1px solid var(--glass-border); color: var(--t2); padding: 7px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 600; }
.sit-btn.active { background: rgba(79,195,247,.2); border-color: var(--blue); color: var(--blue); }

.ipd-workflow-box { background: rgba(79,195,247,.06); border: 1px solid rgba(79,195,247,.18); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.workflow-title { font-size: 13px; font-weight: 800; color: var(--blue); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.workflow-step { margin-bottom: 10px; }
.workflow-step-header { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--t2); margin-bottom: 6px; }
.workflow-step-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
.workflow-step-row:last-child { border-bottom: none; }

.policy-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.policy-card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; }
.policy-insurer { font-size: 10px; font-weight: 800; color: var(--teal); text-transform: uppercase; letter-spacing: .08em; }
.policy-name { font-size: 14px; font-weight: 700; margin-top: 2px; }
.policy-meta { font-size: 11px; color: var(--t3); margin-top: 2px; }
.policy-chips { display: flex; gap: 4px; flex-wrap: wrap; padding: 0 14px 10px; }
.policy-image-strip { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px; background: rgba(255,255,255,.03); scrollbar-width: none; }
.policy-image-strip::-webkit-scrollbar { display: none; }
.policy-img-thumb { width: 80px; height: 52px; object-fit: cover; border-radius: 8px; cursor: pointer; flex-shrink: 0; border: 1px solid var(--border); }
.policy-add-img { width: 80px; height: 52px; border: 1px dashed var(--border2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--t3); cursor: pointer; flex-shrink: 0; }
.riders-toggle { padding: 8px 14px; font-size: 12px; color: var(--blue); cursor: pointer; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
.riders-body { padding: 0 14px 10px; display: none; }
.riders-body.open { display: block; }
.rider-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.rider-name { font-size: 12px; color: var(--t2); flex: 1; }
.rider-val { font-size: 13px; font-weight: 700; color: var(--teal); text-align: right; white-space: nowrap; }
.rider-ded { font-size: 10px; color: var(--red); margin-top: 2px; }

.coverage-summary-box { background: rgba(38,215,179,.06); border: 1px solid rgba(38,215,179,.18); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.cov-title { font-size: 13px; font-weight: 800; color: var(--teal); margin-bottom: 10px; }
.cov-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
.cov-label { color: var(--t3); }
.cov-value { font-weight: 700; color: var(--t1); }

/* ── CHARTS ── */
.chart-wrap { position: relative; height: 200px; margin-top: 10px; }

/* ── SETTINGS ── */
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.settings-label { font-size: 14px; }
.settings-sub { font-size: 11px; color: var(--t3); margin-top: 2px; }

/* ── SEARCH BAR ── */
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-input { flex: 1; background: var(--glass); border: 1px solid var(--glass-border); color: var(--t1); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; }
.search-input::placeholder { color: var(--t3); }

/* ── PROFILE SELECT ── */
.profile-select-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 12px; }
.profile-select-row::-webkit-scrollbar { display: none; }
.profile-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--t2); font-size: 13px; cursor: pointer; font-weight: 600; }
.profile-btn.active { background: linear-gradient(135deg, rgba(79,195,247,.3), rgba(38,215,179,.2)); border-color: var(--blue); color: var(--blue); }

/* ── FAB ── */
.fab { position: fixed; right: 18px; bottom: max(72px, calc(env(safe-area-inset-bottom) + 60px)); width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--teal)); color: #000; font-size: 24px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(79,195,247,.35); z-index: 10; }

/* ── TREND ── */
.trend-up { color: var(--red); }
.trend-down { color: var(--green); }
.trend-stable { color: var(--t3); }
.ai-insight { background: rgba(192,132,252,.08); border: 1px solid rgba(192,132,252,.2); border-radius: var(--radius-sm); padding: 12px; font-size: 13px; color: var(--t2); line-height: 1.6; margin-top: 10px; }

/* ── COMPARE ── */
.compare-header { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.compare-col { text-align: center; font-size: 13px; font-weight: 700; padding: 8px; background: var(--glass); border-radius: var(--radius-sm); }
.compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid var(--border); }
.compare-cell { padding: 8px 10px; font-size: 13px; font-weight: 700; text-align: center; }
.compare-label { font-size: 11px; color: var(--t3); padding: 6px 10px; background: rgba(255,255,255,.03); text-align: center; grid-column: 1/-1; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🫀</div>
    <div class="login-title">HealthVault</div>
    <div class="login-sub" id="login-sub-txt">v2.8.4 · Personal Health & Insurance</div>
    <div style="margin-bottom:8px">
      <div class="field-group"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com" autocomplete="email"></div>
      <div class="field-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    </div>
    <button class="btn-primary" onclick="doLogin()" id="login-btn">Sign In</button>
    <div id="network-warn" style="display:none;font-size:11px;color:var(--amber);margin-top:8px;text-align:center;padding:8px;background:rgba(251,191,36,.08);border-radius:8px;border:1px solid rgba(251,191,36,.2)">
      ⚠️ เปิดใน iPhone/Browser จริงเพื่อ Sign In<br>Preview นี้บล็อก external network
    </div>
    <div style="text-align:center;margin:12px 0;color:var(--t3);font-size:12px">— or —</div>
    <button class="btn-glass" style="width:100%;margin-bottom:8px" onclick="showRegister()">Create Account</button>
    <button class="btn-glass" style="width:100%;color:var(--amber);border-color:rgba(251,191,36,.25)" onclick="launchDemo()">👁 Demo Mode</button>
    <div id="login-err" style="font-size:12px;color:var(--red);margin-top:10px;text-align:center"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" style="display:none;height:100%;flex-direction:column">

  <div id="app-header">
    <div id="header-left">
      <div id="header-title">HealthVault</div>
      <div id="header-sub">v2.8.4</div>
    </div>
    <div id="header-right">
      <button class="hdr-btn" onclick="toggleLang()" id="lang-btn">TH</button>
      <div id="profile-pill" onclick="openProfileSwitch()">Loading…</div>
    </div>
  </div>

  <div id="content">
    <div id="tab-dashboard" class="tab-pane active"></div>
    <div id="tab-health" class="tab-pane"></div>
    <div id="tab-trends" class="tab-pane"></div>
    <div id="tab-insurance" class="tab-pane"></div>
    <div id="tab-settings" class="tab-pane"></div>
  </div>
</div>
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard')" data-tab="dashboard">
      <span class="icon">🏠</span><span data-i18n="tabHome">หน้าหลัก</span>
    </button>
    <button class="tab-btn" onclick="switchTab('health')" data-tab="health">
      <span class="icon">🩺</span><span data-i18n="tabHealth">สุขภาพ</span>
    </button>
    <button class="tab-btn" onclick="switchTab('trends')" data-tab="trends">
      <span class="icon">📈</span><span data-i18n="tabTrends">แนวโน้ม</span>
    </button>
    <button class="tab-btn" onclick="switchTab('insurance')" data-tab="insurance">
      <span class="icon">🛡</span><span data-i18n="tabIns">ประกัน</span>
    </button>
    <button class="tab-btn" onclick="switchTab('settings')" data-tab="settings">
      <span class="icon">⚙️</span><span data-i18n="tabSettings">ตั้งค่า</span>
    </button>
  </div>

<!-- ── FAB ── -->
<button class="fab" id="fab-btn" style="display:none" onclick="fabAction()">＋</button>

<!-- ── MODAL ── -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <div id="modal-handle"></div>
    <div id="modal-head">
      <div id="modal-title"></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── IMAGE VIEWER ── -->
<div id="img-viewer">
  <button id="img-viewer-close" onclick="closeImgViewer()">✕</button>
  <button id="img-nav-prev" onclick="imgNavPrev()" style="display:none">‹</button>

// ── BILINGUAL SEARCH ─────────────────────────────────────────────
function expandSearchTerms(q) {
  const terms = [q.toLowerCase()];
  const synonyms = SEARCH_SYNONYMS[q.toLowerCase()] || [];
  synonyms.forEach(s => terms.push(s));
  // Also add all rider category labels
  const catLabels = Object.values(I18N.th.riderCats).concat(Object.values(I18N.en.riderCats));
  catLabels.forEach(label => { if (label.toLowerCase().includes(q.toLowerCase())) terms.push(label.toLowerCase()); });
  return [...new Set(terms)];
}

function matchesSearch(obj, q) {
  if (!q) return true;
  const terms = expandSearchTerms(q);
  const text = JSON.stringify(obj).toLowerCase();
  return terms.some(term => text.includes(term));
}

// ── FORMAT HELPERS ───────────────────────────────────────────────
function fmtMoney(v) {
  if (!v && v !== 0) return '–';
  const n = parseFloat(v);
  if (n >= 1000000) return (n/1000000).toFixed(n%1000000===0?0:1) + ' M';
  if (n >= 1000) return (n/1000).toFixed(n%1000===0?0:0) + ' K';
  return n.toLocaleString();
}
function fmtDate(d) {
  if (!d) return '–';
  try { return new Date(d).toLocaleDateString(S.lang==='th'?'th-TH':'en-GB',{day:'numeric',month:'short',year:'2-digit'}); }
  catch(e){ return d; }
}
function daysUntil(d) {
  if (!d) return 9999;
  const diff = new Date(d) - new Date();
  return Math.ceil(diff / 86400000);
}

// ── SUPABASE INIT ────────────────────────────────────────────────
async function initSupabase() {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      db: { schema: SCHEMA },
      auth: { persistSession: true, autoRefreshToken: true }
    });
    return true;
  } catch(e) {
    console.warn('Supabase init failed', e);
    return false;
  }
}

async function dbUpsert(table, data) {
  if (S.demoMode || !sb) { toast('⚠️ Demo mode – not saved'); return {data:null, error:'demo'}; }
  try { return await sb.schema(SCHEMA).from(table).upsert(data).select(); }
  catch(e) { return {data:null, error:e}; }
}

async function dbInsert(table, data) {
  if (S.demoMode || !sb) { toast('⚠️ Demo mode – not saved'); return {data:null, error:'demo'}; }
  try { return await sb.schema(SCHEMA).from(table).insert(data).select(); }
  catch(e) { return {data:null, error:e}; }
}

async function dbDelete(table, id) {
  if (S.demoMode || !sb) { toast('⚠️ Demo mode'); return; }
  try { await sb.schema(SCHEMA).from(table).delete().eq('id', id); }
  catch(e) { console.error(e); }
}

async function dbGet(table, query) {
  if (S.demoMode || !sb) return {data: [], error: null};
  try {
    return await sb.schema(SCHEMA).from(table).select(query||'*');
  } catch(e) { return {data:[], error:e}; }
}

// ── AUTH ─────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'กรุณากรอก email และ password'; return; }
  btn.textContent = 'กำลังเข้าสู่ระบบ…'; btn.disabled = true;
  // Step 1: Authenticate — failure stays on login page
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password: pass});
    if (error) throw error;
    S.user = data.user;
    btn.textContent = 'กำลังโหลด…';
  } catch(e) {
    let msg = e.message || 'เข้าสู่ระบบไม่สำเร็จ';
    if (msg.includes('Failed to fetch') || msg.includes('fetch')) {
      msg = '⚠️ เชื่อมต่อ Supabase ไม่ได้ — กรุณาตรวจสอบ internet หรือใช้ Demo Mode';
    } else if (msg.includes('Invalid login') || msg.includes('Invalid email') || msg.includes('credentials')) {
      msg = '❌ Email หรือ Password ไม่ถูกต้อง';
    } else if (msg.includes('Email not confirmed')) {
      msg = '📧 กรุณายืนยัน email ก่อน (ตรวจสอบกล่องจดหมาย)';
    }
    err.textContent = msg;
    btn.textContent = 'Sign In'; btn.disabled = false;
    return;  // Stop here — do not launch app
  }
  // Step 2: Load data (non-fatal — show app even if data fails)
  try { await loadAppData(); } catch(e) { console.error('Data load error:', e); }
  // Step 3: Launch app
  launchApp();
  btn.textContent = 'Sign In'; btn.disabled = false;
  toast('✅ ยินดีต้อนรับกลับ!');
}

async function doRegister(email, pass, name) {
  try {
    const {data, error} = await sb.auth.signUp({email, password: pass, options:{data:{full_name:name}}});
    if (error) throw error;
    return {ok: true};
  } catch(e) {
    return {ok: false, msg: e.message};
  }
}

async function doSignOut() {
  if (!S.demoMode && sb) await sb.auth.signOut();
  S.user = null; S.profiles = []; S.policies = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('fab-btn').style.display = 'none';
}

function showRegister() {
  openModal(t('register'), `
    <div class="field-group"><label>ชื่อ-นามสกุล</label><input id="reg-name" placeholder="ชื่อ นามสกุล"></div>
    <div class="field-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@email.com"></div>

    <button class="btn-primary" onclick="submitRegister()">สมัครสมาชิก</button>
    <div id="reg-err" style="font-size:12px;color:var(--red);margin-top:8px;text-align:center"></div>
  `);
}

async function submitRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-err');
  if (!name || !email || !pass) { err.textContent = 'กรุณากรอกข้อมูลให้ครบ'; return; }
  if (pass.length < 6) { err.textContent = 'Password ต้องมีอย่างน้อย 6 ตัวอักษร'; return; }
  err.textContent = 'กำลังสมัคร…';
  const r = await doRegister(email, pass, name);
  if (r.ok) {
    closeModal();
    toast('✅ สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยัน');
  } else {
    err.textContent = r.msg;
  }
}

// ── DATA LOADING ─────────────────────────────────────────────────
async function loadAppData() {
  try {
    // Load profiles (with error detail)
    const {data: profiles, error: profErr} = await sb.schema(SCHEMA).from('health_profiles').select('*');
    if (profErr) { console.error('Profiles load error:', profErr); }
    if (profiles && profiles.length) {
      // Sort: self first, spouse second, then others
      const relOrder = {self:0, spouse:1, daughter_1:2, daughter_2:3, son_1:4, son_2:5};
      profiles.sort((a,b) => (relOrder[a.relationship]??9) - (relOrder[b.relationship]??9));
      S.profiles = profiles;
      S.currentProfile = profiles[0];
    } else {
      // Create a default profile for this user if none exist
      S.profiles = [{
        id: 'new-profile',
        full_name: S.user.user_metadata?.full_name || S.user.email,
        owner_id: S.user.id, gender: 'male'
      }];
      S.currentProfile = S.profiles[0];
    }

    // Load policies
    const {data: policies, error: polErr} = await sb.schema(SCHEMA).from('insurance_policies').select('*');
    if (polErr) { console.error('Policies load error:', polErr); }
    
    // Load riders, images, cards separately (safer than nested joins across FK types)
    const {data: allRiders} = await sb.schema(SCHEMA).from('policy_riders').select('*');
    const {data: allImages} = await sb.schema(SCHEMA).from('policy_images').select('*');
    const {data: allCards} = await sb.schema(SCHEMA).from('hospital_cards').select('*');
    
    if (policies && policies.length) {
      S.policies = policies.map(pol => {
        const polRiders = (allRiders||[]).filter(r => r.policy_id === pol.id);
        const polImages = (allImages||[]).filter(img => img.policy_number === pol.policy_number || img.policy_id === pol.id);
        const polCards  = (allCards||[]).filter(c => c.policy_id === pol.id);
        return {
          ...pol,
          riders: polRiders.map(r => ({
            id: r.id, name: r.rider_name, cat: r.rider_category,
            amount: r.coverage_amount, perDay: r.per_day || r.coverage_per_day,
            fromFirst: r.covers_from_first_baht, hasDeductible: r.has_deductible,
            deductible: r.deductible_amount, note: r.coverage_notes
          })),
          policy_images: polImages,
          hospital_cards: polCards
        };
      });
    }

    // Load health records — map DB columns to app fields
    for (const p of S.profiles) {
      if (p.id === 'new-profile') continue;
      const {data: recs, error: recErr} = await sb.schema(SCHEMA).from('health_records')
        .select('*').eq('profile_id', p.id).order('record_year', {ascending: false});
      if (recErr) { console.error('Records load error:', recErr); continue; }
      if (recs) {
        S.healthRecords[p.id] = {};
        recs.forEach(r => {
          // Map real DB columns → app field names
          const mapped = mapDbRecord(r);
          S.healthRecords[p.id][r.record_year] = mapped;
        });
        // Set current year to most recent record year
        const years = Object.keys(S.healthRecords[p.id]).map(Number).sort((a,b)=>b-a);
        if (years.length) S.currentYear = years[0];
      }
    }
  } catch(e) {
    console.error('loadAppData failed:', e);
    toast('⚠️ โหลดข้อมูลไม่สมบูรณ์: ' + e.message);
  }
}

// Map DB column names → app field names
function mapDbRecord(r) {
  // Parse blood_pressure "120/80" string
  let bps = null, bpd = null;
  if (r.blood_pressure && r.blood_pressure !== 'N/A' && r.blood_pressure.includes('/')) {
    const parts = r.blood_pressure.split('/');
    bps = parseInt(parts[0]) || null;
    bpd = parseInt(parts[1]) || null;
  }
  return {
    id: r.id,
    profile_id: r.profile_id,
    check_year: r.record_year,
    record_year: r.record_year,
    check_date: r.check_date,
    weight: r.weight_kg ? parseFloat(r.weight_kg) : null,
    height: r.height_cm ? parseFloat(r.height_cm) : null,
    bmi: r.bmi ? parseFloat(r.bmi) : null,
    bp_systolic: bps,
    bp_diastolic: bpd,
    blood_pressure_raw: r.blood_pressure,
    heart_rate: r.pulse_rate,
    glucose: r.blood_sugar ? parseFloat(r.blood_sugar) : null,
    hba1c: r.hba1c ? parseFloat(r.hba1c) : null,
    total_cholesterol: r.cholesterol ? parseFloat(r.cholesterol) : null,
    ldl: r.ldl ? parseFloat(r.ldl) : null,
    hdl: r.hdl ? parseFloat(r.hdl) : null,
    triglyceride: r.triglyceride ? parseFloat(r.triglyceride) : null,
    hemoglobin: r.hemoglobin ? parseFloat(r.hemoglobin) : null,
    wbc: r.wbc ? parseFloat(r.wbc) : null,
    platelet: r.platelet ? parseFloat(r.platelet) : null,
    creatinine: r.creatinine ? parseFloat(r.creatinine) : null,
    bun: r.bun ? parseFloat(r.bun) : null,
    uric_acid: r.uric_acid ? parseFloat(r.uric_acid) : null,
    sgot: r.sgot ? parseFloat(r.sgot) : null,
    sgpt: r.sgpt ? parseFloat(r.sgpt) : null,
    alk_phos: r.alp ? parseFloat(r.alp) : null,
    chest_xray: r.chest_xray || r.chest_xray_notes,
    ekg: r.ekg_normal !== null ? (r.ekg_normal ? 'ปกติ' : 'ผิดปกติ') : null,
    notes: r.doctor_notes || r.other_notes,
    // Keep raw for upsert
    _raw: r
  };
}

// Map app fields → DB columns for insert/upsert
function mapAppToDb(appRec, profileId, ownerId) {
  const bpStr = (appRec.bp_systolic && appRec.bp_diastolic) ? appRec.bp_systolic+'/'+appRec.bp_diastolic : null;
  const obj = {
    profile_id: profileId,
    record_year: appRec.check_year || appRec.record_year,
    weight_kg: appRec.weight || null,
    height_cm: appRec.height || null,
    bmi: appRec.bmi || null,
    blood_pressure: bpStr || appRec.blood_pressure_raw || null,
    pulse_rate: appRec.heart_rate || null,
    blood_sugar: appRec.glucose || null,
    hba1c: appRec.hba1c || null,
    cholesterol: appRec.total_cholesterol || null,
    ldl: appRec.ldl || null,
    hdl: appRec.hdl || null,
    triglyceride: appRec.triglyceride || null,
    hemoglobin: appRec.hemoglobin || null,
    wbc: appRec.wbc || null,
    platelet: appRec.platelet || null,
    creatinine: appRec.creatinine || null,
    bun: appRec.bun || null,
    uric_acid: appRec.uric_acid || null,
    sgot: appRec.sgot || null,
    sgpt: appRec.sgpt || null,
    alp: appRec.alk_phos || null,
    chest_xray: appRec.chest_xray || null,
    doctor_notes: appRec.notes || null,
  };
  if (appRec.id && !appRec.id.toString().startsWith('demo')) obj.id = appRec.id;
  return obj;
}

// ── TAB SWITCHING ─────────────────────────────────────────────────
S.activeTab = 'dashboard';
function switchTab(tab) {
  S.activeTab = tab;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  switch(tab) {
    case 'dashboard': renderDashboard(); break;
    case 'health': renderHealth(); break;
    case 'trends': renderTrends(); break;
    case 'insurance': renderInsurance(); break;
    case 'settings': renderSettings(); break;
  }
}

// TAB: DASHBOARD
// ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const p = S.currentProfile;
  if (!p) return;
  const recs = S.healthRecords[p.id] || {};
  const years = Object.keys(recs).map(Number).sort((a,b)=>b-a);
  const latest = recs[years[0]] || {};
  const prev = recs[years[1]] || {};
  const age = p.date_of_birth ? Math.floor((new Date() - new Date(p.date_of_birth)) / 31557600000) : '–';

  // Alerts
  const alerts = [];
  if (latest.ldl > 130) alerts.push({icon:'🔴', msg:`<strong>LDL ${latest.ldl}</strong> mg/dL — ${S.lang==='th'?'สูงกว่าค่ามาตรฐาน (< 130)':'Above normal (< 130 target)'}`});
  if (latest.bp_systolic > 130) alerts.push({icon:'🟠', msg:`<strong>${t('bp')} ${latest.bp_systolic}/${latest.bp_diastolic}</strong> — ${S.lang==='th'?'ควรติดตาม':'Monitor closely'}`});
  if (latest.bmi > 25) alerts.push({icon:'🟡', msg:`<strong>BMI ${latest.bmi}</strong> — ${S.lang==='th'?'น้ำหนักเกินเกณฑ์':'Overweight range'}`});
  if (latest.glucose > 100) alerts.push({icon:'🟠', msg:`<strong>${t('glucose')} ${latest.glucose}</strong> mg/dL — ${S.lang==='th'?'Borderline สูง':'Borderline high'}`});
  // Premium due alerts
  const now = new Date();
  S.policies.forEach(pol => {
    if (pol.policy_status !== 'active') return;
    if (!pol.premium_due_month) return;
    const dueDate = new Date(now.getFullYear(), pol.premium_due_month - 1, 1);
    const days = Math.ceil((dueDate - now) / 86400000);
    if (days >= 0 && days <= 45) {
      alerts.push({icon:'💰', msg:`<strong>${pol.policy_name}</strong> — ${t('premiumDueIn')} ${days} ${t('days')} (${fmtMoney(pol.annual_premium)} ฿)`});
    }
  });

  // Profile selector
  let profileTabs = '<div class="profile-select-row">';
  S.profiles.forEach(prof => {
    profileTabs += `<button class="profile-btn ${prof.id===p.id?'active':''}" onclick="switchProfile('${prof.id}')">${prof.nickname||(prof.full_name||'').split(' ')[0]}</button>`;
  });
  profileTabs += '</div>';

  // Metrics
  function delta(cur, prev, invert) {
    if (!cur || !prev) return '';
    const d = cur - prev;
    if (Math.abs(d) < 0.1) return '';
    const up = d > 0;
    const good = invert ? !up : up;
    return `<span class="${good?'trend-up':'trend-down'}">${up?'↑':'↓'}${Math.abs(d).toFixed(1)}</span>`;
  }

  const html = `
    ${profileTabs}
    <div class="hero-card">
      <div class="hero-name">${p.full_name||'–'}</div>
      <div class="hero-meta">${t('age')} ${age} ${t('years')} · ${(p.gender||'').toLowerCase()==='male'?t('male'):t('female')} · ${p.blood_group||'–'} · ID: ${p.national_id||'–'}</div>
      <div style="margin-top:8px;font-size:12px;color:var(--t3)">${t('lastCheck')}: ${years[0] ? years[0] + ' (' + (latest.check_date||years[0]) + ')' : t('noRecord')}</div>
    </div>

    <div class="section-title">${t('alerts')}</div>
    ${alerts.length ? alerts.map(a=>`<div class="alert-row"><div class="alert-icon">${a.icon}</div><div class="alert-text">${a.msg}</div></div>`).join('') : `<div class="card" style="color:var(--green);font-size:13px">✅ ${t('noAlerts')}</div>`}

    <div class="section-title">${S.lang==='th'?'ค่าสุขภาพล่าสุด':'Latest Health Metrics'}</div>
    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">BMI</div>
        <div class="metric-value ${latest.bmi>25?'trend-up':''}">${latest.bmi||'–'}</div>
        <div class="metric-delta">${delta(latest.bmi,prev.bmi,true)} ${latest.weight?latest.weight+'kg':''}${latest.height?' · '+latest.height+'cm':''}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">${t('bp')}</div>
        <div class="metric-value ${latest.bp_systolic>130?'trend-up':''}">${latest.bp_systolic||'–'}/${latest.bp_diastolic||'–'}</div>
        <div class="metric-delta">${delta(latest.bp_systolic,prev.bp_systolic,true)} mmHg</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">LDL</div>
        <div class="metric-value ${latest.ldl>130?'trend-up':''}">${latest.ldl||'–'}</div>
        <div class="metric-delta">${delta(latest.ldl,prev.ldl,true)} mg/dL</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">${t('glucose')}</div>
        <div class="metric-value ${latest.glucose>100?'trend-up':''}">${latest.glucose||'–'}</div>
        <div class="metric-delta">${delta(latest.glucose,prev.glucose,true)} mg/dL</div>
      </div>
    </div>

    <div class="section-title">${S.lang==='th'?'ประกันที่ใช้งาน':'Active Insurance'}</div>
    ${S.policies.filter(pol=>pol.policy_status==='active').slice(0,3).map(pol=>`
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px">
        <div>
          <div style="font-size:12px;color:var(--t3);font-weight:700">${pol.insurer_code||'–'}</div>
          <div style="font-size:13px;font-weight:600">${pol.policy_name}</div>
        </div>
        <div style="text-align:right">
          <div class="badge badge-green">${t('active')}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:3px">${fmtMoney(pol.annual_premium)} ฿${t('perYear')}</div>
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('tab-dashboard').innerHTML = html;
}

        {key:'bp_systolic', name:t('bp'), val:rec.bp_systolic?rec.bp_systolic+'/'+rec.bp_diastolic:'–', unit:'mmHg', highRaw:rec.bp_systolic>130},
        {key:'heart_rate', name:t('hr'), val:rec.heart_rate, unit:'bpm', low:60, high:100},
      ]
    },
    {
      title: '🩸 Blood Sugar',
      rows: [
        {key:'glucose', name:'Fasting Glucose', val:rec.glucose, unit:'mg/dL', high:100},
        {key:'hba1c', name:'HbA1c', val:rec.hba1c, unit:'%', high:5.7},
      ]
    },
    {
      title: '🫀 CBC',
      rows: [
        {key:'hemoglobin', name:t('hb'), val:rec.hemoglobin, unit:'g/dL', low:isMale?13:12, high:isMale?17:15},
        {key:'wbc', name:t('wbc'), val:rec.wbc?rec.wbc.toLocaleString():null, unit:'cells/μL'},
        {key:'platelet', name:t('plt'), val:rec.platelet?rec.platelet.toLocaleString():null, unit:'cells/μL'},
      ]
    },
    {
      title: '🔵 Kidney',
      rows: [
        {key:'creatinine', name:t('creatinine'), val:rec.creatinine, unit:'mg/dL', high:isMale?1.2:1.0},
        {key:'bun', name:t('bun'), val:rec.bun, unit:'mg/dL', high:20},
        {key:'uric_acid', name:t('uricAcid'), val:rec.uric_acid, unit:'mg/dL', high:isMale?7:6},
      ]
    },
    {
      title: '🟢 Liver',
      rows: [
        {key:'sgot', name:t('sgot'), val:rec.sgot, unit:'U/L', high:40},
        {key:'sgpt', name:t('sgpt'), val:rec.sgpt, unit:'U/L', high:isMale?45:35},
        {key:'alk_phos', name:t('alkPhos'), val:rec.alk_phos, unit:'U/L', high:120},
      ]
    },
    {
      title: '📸 Imaging / Special',
      rows: [
        {key:'chest_xray', name:t('xray'), val:rec.chest_xray, isText:true},
        {key:'ekg', name:t('ekg'), val:rec.ekg, isText:true},
      ]
    },
  ];

  return sections.map(sec => {
    const validRows = sec.rows.filter(r => r.val !== null && r.val !== undefined);
    if (!validRows.length) return '';
    return `
      <div class="record-cat">
        <div class="record-cat-title">${sec.title}</div>
        ${validRows.map(r => {
          let badge = '';
          let colorClass = '';
          if (!r.isText) {
            const v = parseFloat(r.val);
            if (!isNaN(v)) {
              if (r.highRaw || (r.high && v > r.high)) { badge = `<span class="badge badge-red">${t('high')}</span>`; colorClass = 'trend-up'; }
              else if (r.low && v < r.low && !r.lowGood) { badge = `<span class="badge badge-red">${t('low')}</span>`; colorClass = 'trend-up'; }
              else if (r.lowGood && v < r.lowGood) { badge = `<span class="badge badge-amber">Low</span>`; }
              else { badge = `<span class="badge badge-green">${t('normal')}</span>`; }
            }
          }
          const rangeStr = r.isText ? '' : `${r.low?r.low+'-':'<'}${r.high||r.lowGood||''}${r.unit?' '+r.unit:''}`;
          return `
            <div class="record-row">
              <div>
                <div class="record-name">${r.name}</div>
                ${rangeStr ? `<div class="record-range">${S.lang==='th'?'ค่าปกติ':'Normal'}: ${rangeStr}</div>` : ''}
              </div>
              <div class="record-val-block">
                <div class="record-value ${colorClass}">${r.val}${r.unit&&!r.isText?' <span class="record-unit">'+r.unit+'</span>':''}</div>
                ${badge}
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

async function saveManualEntry() {
  const p = S.currentProfile;
  if (!p) { toast('⚠️ ไม่มีโปรไฟล์'); return; }
  const year = parseInt(document.getElementById('me-year').value) || S.currentYear;
  const existing = (S.healthRecords[p.id]||{})[year];
  const w = parseFloat(document.getElementById('me-weight').value)||null;
  const h = parseFloat(document.getElementById('me-height').value)||null;
  const bps = parseInt(document.getElementById('me-bps').value)||null;
  const bpd = parseInt(document.getElementById('me-bpd').value)||null;

  const appRec = {
    check_year: year,
    id: existing?.id,
    weight: w, height: h,
    bmi: (w&&h) ? parseFloat((w/((h/100)**2)).toFixed(1)) : null,
    bp_systolic: bps, bp_diastolic: bpd,
    ldl: parseFloat(document.getElementById('me-ldl').value)||null,
    hdl: parseFloat(document.getElementById('me-hdl').value)||null,
    total_cholesterol: parseFloat(document.getElementById('me-tc').value)||null,
    triglyceride: parseFloat(document.getElementById('me-tg').value)||null,
    glucose: parseFloat(document.getElementById('me-glu').value)||null,
    hba1c: parseFloat(document.getElementById('me-hba1c').value)||null,
    sgot: parseFloat(document.getElementById('me-sgot').value)||null,
    sgpt: parseFloat(document.getElementById('me-sgpt').value)||null,
    creatinine: parseFloat(document.getElementById('me-creat').value)||null,
    uric_acid: parseFloat(document.getElementById('me-ua').value)||null,
    notes: document.getElementById('me-notes').value || null
  };

  if (S.demoMode) {
    if (!S.healthRecords[p.id]) S.healthRecords[p.id] = {};
    S.healthRecords[p.id][year] = {...appRec, id: 'demo-'+year};
  } else {
    const dbPayload = mapAppToDb(appRec, p.id, S.user.id);
    const {data, error} = await sb.schema(SCHEMA).from('health_records').upsert(dbPayload, {onConflict: 'profile_id,record_year'}).select();
    if (error) { toast('❌ ' + (error.message||JSON.stringify(error))); return; }
    if (data?.[0]) {
      if (!S.healthRecords[p.id]) S.healthRecords[p.id] = {};
      S.healthRecords[p.id][year] = mapDbRecord(data[0]);
    }
  }
  closeModal();
  S.currentYear = year;
  renderHealth();
  toast('✅ บันทึกแล้ว');
}

async function handleHealthUpload(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  openModal('📷 กำลังอ่านผลตรวจ…', `
    <div style="text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:12px">🔍</div>
      <div style="color:var(--t2);font-size:13px">AI กำลังอ่านผลตรวจ (${files.length} ไฟล์)…<br>อาจใช้เวลา 15-30 วินาที</div>
      <div id="upload-progress" style="margin-top:12px;font-size:12px;color:var(--t3)"></div>
    </div>
  `);

  // Convert to base64 and call Anthropic API
  try {
    const base64Images = await Promise.all(files.map(f => new Promise((res,rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(f);
    })));

    document.getElementById('upload-progress').textContent = 'กำลังส่งไปยัง AI...';

    const messages = [{
      role: 'user',
      content: [
        ...base64Images.map(b => ({type:'image', source:{type:'base64', media_type:'image/jpeg', data:b}})),
        {type:'text', text:`Extract health check results from these lab report images. 
Return ONLY a JSON object with these exact fields (use null for missing values):
{
  "check_year": number,
  "weight": number (kg),
  "height": number (cm),
  "bp_systolic": number,
  "bp_diastolic": number,
  "heart_rate": number (bpm),
  "glucose": number (mg/dL fasting),
  "hba1c": number (%),
  "total_cholesterol": number (mg/dL),
  "ldl": number (mg/dL),
  "hdl": number (mg/dL),
  "triglyceride": number (mg/dL),
  "hemoglobin": number (g/dL),
  "wbc": number (cells/uL),
  "platelet": number (cells/uL),
  "creatinine": number (mg/dL),
  "bun": number (mg/dL),
  "uric_acid": number (mg/dL),
  "sgot": number (U/L),
  "sgpt": number (U/L),
  "alk_phos": number (U/L),
  "chest_xray": string (text finding or null),
  "notes": string (key findings in Thai or null)
}
Return ONLY valid JSON, no markdown, no explanation.`}
      ]
    }];

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, messages})
    });
    const data = await response.json();
    const textContent = data.content?.find(c=>c.type==='text')?.text || '';

    let extracted = {};
    try {
      const clean = textContent.replace(/```json?/g,'').replace(/```/g,'').trim();
      extracted = JSON.parse(clean);
    } catch(e) { toast('⚠️ ไม่สามารถอ่านผลได้ กรุณาบันทึกเอง'); closeModal(); return; }

    // Show preview for confirmation
    const year = extracted.check_year || new Date().getFullYear();
    closeModal();
    openModal('✅ อ่านผลสำเร็จ — ยืนยัน ' + year, `
      <div style="background:var(--glass);border-radius:10px;padding:12px;margin-bottom:12px;font-size:12px">
        ${Object.entries(extracted).filter(([k,v])=>v!==null&&k!=='check_year').map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="color:var(--t3)">${k}</span><strong>${v}</strong></div>`).join('')}
      </div>
      <button class="btn-primary" onclick="confirmUploadedData(${JSON.stringify(extracted).replace(/"/g,'&quot;')})">💾 บันทึกข้อมูลนี้</button>
      <button class="btn-glass" style="width:100%;margin-top:8px" onclick="openManualEntry()">✏️ แก้ไขก่อนบันทึก</button>
    `);
  } catch(e) {
    toast('❌ เกิดข้อผิดพลาด: ' + e.message);
    closeModal();
  }
  input.value = '';
}

  } else {
    const dbPayload = mapAppToDb(appRec, p.id, S.user.id);

  }
  closeModal(); S.currentYear = year; renderHealth(); toast('✅ บันทึกผลตรวจแล้ว!');
}

let _charts = {};
function renderTrends() {
  const p = S.currentProfile;
  const recs = S.healthRecords[p?.id] || {};
  const years = Object.keys(recs).map(Number).sort((a,b)=>a-b);

  // Profile tabs + compare toggle
  let pTabs = '<div class="profile-select-row">';
  S.profiles.forEach(prof => { pTabs += `<button class="profile-btn ${prof.id===p.id?'active':''}" onclick="switchProfile('${prof.id}')">${prof.nickname||(prof.full_name||'').split(' ')[0]}</button>`; });
  pTabs += `<button class="profile-btn" onclick="renderCompare()" style="border-color:var(--purple);color:var(--purple)">⚖️ ${t('compareTitle')}</button>`;
  pTabs += '</div>';

  if (!years.length) {
    document.getElementById('tab-trends').innerHTML = pTabs + `<div class="card" style="text-align:center;color:var(--t3);padding:30px">${t('noData')}</div>`;
    return;
  }

  const getArr = key => years.map(y => recs[y]?.[key]||null);

  const chartDefs = [
    {id:'ch-ldl', label:'LDL vs HDL', datasets:[
      {label:'LDL', data:getArr('ldl'), color:'#f87171', refLine:130},
      {label:'HDL', data:getArr('hdl'), color:'#4ade80', refLine:40}
    ]},
    {id:'ch-weight', label:t('weight')+' & BMI', datasets:[
      {label:t('weight')+' (kg)', data:getArr('weight'), color:'#4fc3f7'},
      {label:'BMI', data:getArr('bmi'), color:'#fbbf24', yAxis:'y2'}
    ]},
    {id:'ch-glu', label:t('glucose')+' & HbA1c', datasets:[
      {label:'Glucose mg/dL', data:getArr('glucose'), color:'#c084fc'},
      {label:'HbA1c %×10', data:getArr('hba1c').map(v=>v?v*10:null), color:'#f472b6'}
    ]},
    {id:'ch-liver', label:'SGOT / SGPT', datasets:[
      {label:'SGOT', data:getArr('sgot'), color:'#26d7b3'},
      {label:'SGPT', data:getArr('sgpt'), color:'#fb923c'}
    ]}
  ];

  // LDL insight
  const ldlVals = getArr('ldl').filter(Boolean);
  let insight = '';
  if (ldlVals.length >= 2) {
    const trend = ldlVals[ldlVals.length-1] - ldlVals[0];
    const last = ldlVals[ldlVals.length-1];
    if (S.lang === 'th') {
      if (trend > 15) insight = `⚠️ LDL เพิ่มขึ้น ${trend.toFixed(0)} mg/dL ใน ${ldlVals.length} ปีที่ผ่านมา ค่าล่าสุด ${last} mg/dL ${last>160?'(สูงกว่าเกณฑ์ผู้เสี่ยงโรคหัวใจ)':''} แนะนำ: ลดอาหารมัน เพิ่มผักใบเขียว ออกกำลังกาย 150 นาที/สัปดาห์ ปรึกษาแพทย์เรื่อง statin`;
      else if (trend > 0) insight = `LDL trending slightly upward (${trend.toFixed(0)} mg/dL over ${ldlVals.length} years). Monitor diet and exercise.`;
      else insight = `✅ LDL trend stable or improving. Continue healthy habits.`;
    } else {
      if (trend > 15) insight = `⚠️ LDL increased by ${trend.toFixed(0)} mg/dL over ${ldlVals.length} years. Latest: ${last} mg/dL. Recommend: reduce saturated fats, increase fiber, exercise 150min/week, consult doctor about statin therapy.`;
      else if (trend > 0) insight = `LDL slightly increasing (+${trend.toFixed(0)} mg/dL). Monitor closely.`;
      else insight = `✅ LDL trending stable or improving. Keep it up!`;
    }
  }

  const html = `
    ${pTabs}
    <div class="section-title">${t('trendTitle')}</div>
    ${chartDefs.map(c => `
      <div class="card">
        <div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:8px">${c.label}</div>
        <div class="chart-wrap"><canvas id="${c.id}"></canvas></div>
      </div>
    `).join('')}
    ${insight ? `<div class="ai-insight"><div style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:6px">🤖 ${t('insight')}</div>${insight}</div>` : ''}
  `;
  document.getElementById('tab-trends').innerHTML = html;

  // Render charts after DOM update
  setTimeout(() => {
    chartDefs.forEach(def => {
      const canvas = document.getElementById(def.id);
      if (!canvas) return;
      if (_charts[def.id]) { _charts[def.id].destroy(); }
      _charts[def.id] = new Chart(canvas, {
        type: 'line',
        data: {
          labels: years,
          datasets: def.datasets.map(ds => ({
            label: ds.label, data: ds.data,
            borderColor: ds.color, backgroundColor: ds.color+'22',
            borderWidth: 2, pointRadius: 4, pointBackgroundColor: ds.color,
            tension: 0.3, fill: true, spanGaps: true
          }))
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {legend:{labels:{color:'#a0a0b5',font:{size:11}}}, tooltip:{mode:'index',intersect:false}},
          scales: {
            x:{ticks:{color:'#606070',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}},
            y:{ticks:{color:'#606070',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}}
          }
        }
      });
    });
  }, 50);
}

function renderCompare() {
  if (S.profiles.length < 2) {
    toast(S.lang==='th'?'ต้องมีอย่างน้อย 2 โปรไฟล์':'Need at least 2 profiles');
    return;
  }
  const p1 = S.profiles[0], p2 = S.profiles[1];
  const r1 = Object.values(S.healthRecords[p1.id]||{}).sort((a,b)=>b.check_year-a.check_year)[0]||{};
  const r2 = Object.values(S.healthRecords[p2.id]||{}).sort((a,b)=>b.check_year-a.check_year)[0]||{};
  const metrics = [
    ['BMI','bmi',18.5,25,''],['LDL','ldl',null,130,'mg/dL'],['HDL','hdl',40,null,'mg/dL'],
    ['Glucose','glucose',null,100,'mg/dL'],['Total Chol','total_cholesterol',null,200,'mg/dL'],
    [t('weight'),'weight',null,null,'kg'],[t('bp'),'bp_systolic',null,130,'mmHg'],
    ['SGPT','sgpt',null,45,'U/L'],['Creatinine','creatinine',null,1.2,'mg/dL']
  ];

  function cellStyle(val, low, high) {
    const v = parseFloat(val);
    if (isNaN(v)) return '';
    if (high && v > high) return 'color:var(--red)';
    if (low && v < low) return 'color:var(--amber)';
    return 'color:var(--green)';
  }

  const html = `
    <div class="compare-header">
      <div class="compare-col" style="background:rgba(79,195,247,.1);color:var(--blue)">${p1.full_name}</div>
      <div class="compare-col" style="background:rgba(244,114,182,.1);color:var(--pink)">${p2.full_name}</div>
    </div>
    ${metrics.map(([name, key, low, high, unit]) => `
      <div class="compare-label">${name}${unit?' ('+unit+')':''}</div>
      <div class="compare-row">
        <div class="compare-cell" style="${cellStyle(r1[key],low,high)}">${r1[key]||'–'}</div>
        <div class="compare-cell" style="${cellStyle(r2[key],low,high)}">${r2[key]||'–'}</div>
      </div>
    `).join('')}
  `;
  openModal('⚖️ ' + t('compareTitle'), html);
}

function renderInsurance() {
  const th = S.lang === 'th';

  // ── BUILD DYNAMIC COVERAGE SUMMARY FROM ACTUAL POLICIES ─────
  function buildCoverageSummary() {
    const myPolicies = S.policies.filter(p => p.policy_status === 'active');
    if (!myPolicies.length) return '';

    // Find best room rate
    let bestRoom = 0, bestRoomName = '';
    let bestICU = 0;
    let totalSurgery = 0;
    let hasSurgery = false;
    let bestCI = 0;
    let bestOPD = 0;
    let bestCash = 0;
    let totalPremium = 0;

    myPolicies.forEach(pol => {
      if (pol.annual_premium) totalPremium += parseFloat(pol.annual_premium)||0;
      (pol.riders||[]).forEach(r => {
        if (r.cat === 'ipd_room_board' && (r.perDay||0) > bestRoom) { bestRoom = r.perDay||0; bestRoomName = pol.insurer_code||''; }
        if (r.cat === 'icu' && (r.perDay||0) > bestICU) bestICU = r.perDay||0;
        if (['ipd_surgery','ipd_surgery_room'].includes(r.cat)) { hasSurgery = true; totalSurgery += r.amount||0; }
        if (r.cat === 'opd_general' && (r.amount||r.perDay||0) > bestOPD) bestOPD = r.amount||r.perDay||0;
        if (r.cat === 'daily_hospital_cash' && (r.perDay||0) > bestCash) bestCash = r.perDay||0;
        if (['critical_illness_severe','critical_illness_cancer','cancer'].includes(r.cat) && (r.amount||0) > bestCI) bestCI = r.amount||0;
      });
    });

    const rows = [
      bestRoom ? [th?'ค่าห้องสูงสุด':'Best Room Rate', fmtMoney(bestRoom)+' ฿'+(th?'/วัน':'/day'), '🛏'] : null,
      bestICU ? [th?'ICU สูงสุด':'Best ICU Rate', fmtMoney(bestICU)+' ฿'+(th?'/วัน':'/day'), '🏥'] : null,
      hasSurgery ? [th?'ค่าผ่าตัดรวม':'Surgery Coverage', fmtMoney(totalSurgery)+' ฿', '🪡'] : null,
      bestCI ? [th?'CI/มะเร็งสูงสุด':'Best CI/Cancer', fmtMoney(bestCI)+' ฿', '🧬'] : null,
      bestOPD ? [th?'OPD ต่อครั้ง':'OPD Per Visit', fmtMoney(bestOPD)+' ฿', '💊'] : null,
      bestCash ? [th?'ชดเชยรายวัน':'Daily Cash', fmtMoney(bestCash)+' ฿'+(th?'/วัน':'/day'), '💵'] : null,
      [th?'เบี้ยรวมต่อปี':'Total Annual Premium', fmtMoney(totalPremium)+' ฿', '💰']
    ].filter(Boolean);

    return `
      <div class="coverage-summary-box">
        <div class="cov-title">📊 ${th?'สรุปความคุ้มครองรวม':'Coverage Summary'} (${myPolicies.length} ${th?'กรมธรรม์':'policies'})</div>
        ${rows.map(([label, val, icon]) => `
          <div class="cov-row"><div class="cov-label">${icon} ${label}</div><div class="cov-value">${val}</div></div>
        `).join('')}
      </div>`;
  }

  // ── IPD WORKFLOW (always at top of insurance view) ───────────
  function buildIPDWorkflow() {
    // Collect all room coverage policies
    const roomPolicies = [];
    S.policies.filter(p=>p.policy_status==='active').forEach(pol => {
      (pol.riders||[]).forEach(r => {
        if (r.cat === 'ipd_room_board') roomPolicies.push({pol, r});
      });
    });
    const fromFirst = roomPolicies.filter(x=>x.r.fromFirst).sort((a,b)=>(b.r.perDay||0)-(a.r.perDay||0));
    const afterDed = roomPolicies.filter(x=>!x.r.fromFirst).sort((a,b)=>(b.r.perDay||0)-(a.r.perDay||0));

    if (!roomPolicies.length) return '';

    return `
      <div class="ipd-workflow-box">
        <div class="workflow-title">🏥 ${th?'ขั้นตอนการเบิก IPD':'IPD Claim Workflow'}</div>

        <div class="workflow-step">
          <div class="workflow-step-header">
            ${th?'ขั้นที่ 1 — ค่าห้องตั้งแต่บาทแรก':'Step 1 — Room from 1st Baht'}
            ${fromFirst.length ? `<span style="float:right;color:var(--green)">✅ ${fromFirst.length} ${th?'รายการ':'items'}</span>` : `<span style="float:right;color:var(--red)">❌ ${th?'ไม่มี':'None'}</span>`}
          </div>
          ${fromFirst.map(({pol,r}) => `
            <div class="workflow-step-row">
              <span><span class="badge badge-teal" style="margin-right:6px">${pol.insurer_code||'INS'}</span>${r.name}</span>
              <span style="color:var(--teal);font-weight:700">${fmtMoney(r.perDay)} ฿${th?'/วัน':'/day'}</span>
            </div>`).join('')}
        </div>

        ${afterDed.length ? `
          <div class="workflow-step">
            <div class="workflow-step-header">
              ${th?'ขั้นที่ 2 — หลัง Deductible':'Step 2 — After Deductible'}
              <span style="float:right;color:var(--amber)">${afterDed.length} ${th?'รายการ':'items'}</span>
            </div>
            ${afterDed.map(({pol,r}) => `
              <div class="workflow-step-row">
                <span><span class="badge badge-amber" style="margin-right:6px">${pol.insurer_code||'INS'}</span>${r.name}${r.deductible?` <span style="font-size:10px;color:var(--red)">(หลัง ${fmtMoney(r.deductible)} ฿)</span>`:''}</span>
                <span style="color:var(--amber);font-weight:700">${fmtMoney(r.perDay)} ฿${th?'/วัน':'/day'}</span>
              </div>`).join('')}
          </div>` : ''}
      </div>`;
  }

  // ── SITUATION VIEW ──────────────────────────────────────────
  function buildSituationView(catFilter) {
    const CAT_MAP = {
      room: ['ipd_room_board'],
      icu: ['icu'],
      surgery: ['ipd_surgery','ipd_surgery_room','ipd_anesthesia'],
      opd: ['opd_general','opd_accident','opd_consult','opd_lab'],
      cash: ['daily_hospital_cash'],
      ci: ['critical_illness_severe','critical_illness_early','critical_illness_cancer','cancer']
    };
    const cats = CAT_MAP[catFilter] || [];
    let rows = [];
    S.policies.filter(p=>p.policy_status==='active').forEach(pol => {
      (pol.riders||[]).forEach(r => {
        if (!cats.includes(r.cat)) return;
        rows.push({pol, r});
      });
    });
    rows.sort((a,b) => {
      if (a.r.fromFirst && !b.r.fromFirst) return -1;
      if (!a.r.fromFirst && b.r.fromFirst) return 1;
      return ((b.r.perDay||b.r.amount||0) - (a.r.perDay||a.r.amount||0));
    });
    if (!rows.length) return `<div class="card" style="text-align:center;color:var(--t3);padding:24px">${t('noData')}</div>`;
    return rows.map(({pol,r}) => {
      const valStr = r.perDay ? `${fmtMoney(r.perDay)} ฿${th?'/วัน':'/day'}` : r.amount ? `${fmtMoney(r.amount)} ฿` : '';
      return `
        <div class="card2">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
                <span class="badge badge-teal">${pol.insurer_code||'INS'}</span>
                ${r.fromFirst?`<span class="badge badge-green">${th?'บาทแรก':'1st Baht'}</span>`:`<span class="badge badge-amber">${th?'มี Ded.':'Has Ded.'}</span>`}
              </div>
              <div style="font-size:13px;font-weight:600">${r.name}</div>
              <div style="font-size:11px;color:var(--t3)">${pol.policy_name} · ${pol.policy_number||''}</div>
              ${r.deductible?`<div style="font-size:11px;color:var(--red)">⚠️ Deductible ${fmtMoney(r.deductible)} ฿</div>`:''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:20px;font-weight:800;color:var(--teal)">${valStr}</div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── ALL POLICIES VIEW ────────────────────────────────────────
  function buildAllPolicies() {
    const filtered = S.policies.filter(p => matchesSearch(p, S.insSearch));
    if (!filtered.length) return `<div class="card" style="text-align:center;color:var(--t3);padding:24px">${t('noData')}</div>`;
    return filtered.map(pol => buildPolicyCard(pol)).join('');
  }

  function buildPolicyCard(pol) {
    const isActive = pol.policy_status === 'active';
    const riderGroups = {};
    (pol.riders||[]).forEach(r => {
      if (!riderGroups[r.cat]) riderGroups[r.cat] = [];
      riderGroups[r.cat].push(r);
    });
    const riderCount = (pol.riders||[]).length;
    const cards = pol.hospital_cards || pol.cards || [];
    const images = pol.policy_images || pol.images || [];

    return `
      <div class="policy-card">
        <div class="policy-card-header">
          <div>
            <div class="policy-insurer">${pol.insurer_code||pol.insurer||'–'}</div>
            <div class="policy-name">${pol.policy_name||pol.name||'–'}</div>
            <div class="policy-meta">${pol.policy_number||''} · ${pol.holder_name||''}</div>
          </div>
          <div style="text-align:right">
            <div class="badge ${isActive?'badge-green':'badge-red'}">${isActive?t('active'):t('inactive')}</div>
            <div style="font-size:12px;color:var(--t3);margin-top:4px">${fmtMoney(pol.annual_premium)} ฿${t('perYear')}</div>
            ${pol.premium_due_month ? `<div style="font-size:10px;color:var(--amber)">${th?'ครบ':'Due'} ${pol.premium_due_month}/${pol.paid_year||''}</div>` : ''}
          </div>
        </div>
        <div class="policy-chips">
          ${pol.sum_assured?`<span class="badge badge-blue">${th?'ทุน':'Sum'} ${fmtMoney(pol.sum_assured)} ฿</span>`:''}
          ${pol.policy_category==='health'?`<span class="badge badge-teal">${th?'ประกันสุขภาพ':'Health'}</span>`:''}
          ${pol.policy_category==='life'?`<span class="badge badge-purple">${th?'ประกันชีวิต':'Life'}</span>`:''}
        </div>
        ${(images.length||cards.length) ? `
          <div class="policy-image-strip">
            ${images.map((img,i)=>`<img class="policy-img-thumb" src="${img.image_data||img.data||img.image_url||''}" onclick="openImgViewer('${pol.id||pol.policy_number}',${i})">`).join('')}
            <div class="policy-add-img" onclick="openAddPolicyImg('${pol.id||pol.policy_number}')">📷</div>
          </div>` : `<div style="padding:4px 14px 0"><button class="btn-glass" style="font-size:12px;padding:6px 12px;width:auto" onclick="openAddPolicyImg('${pol.id||pol.policy_number}')">📷 ${th?'เพิ่มรูป':'Add Photo'}</button></div>`}
        ${riderCount ? `
          <div class="riders-toggle" onclick="toggleRiders('${pol.id||pol.policy_number}')">
            📋 ${th?'สัญญาเพิ่มเติม':'Riders'} (${riderCount}) <span id="ricon-${pol.id||pol.policy_number}">▼</span>
          </div>
          <div class="riders-body" id="riders-${pol.id||pol.policy_number}">
            ${Object.entries(riderGroups).map(([cat,riders]) => `
              <div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin:8px 0 4px;letter-spacing:.06em">${tRiderCat(cat)}</div>
              ${riders.map(r => {
                const val = r.perDay ? `${fmtMoney(r.perDay)} ฿${th?'/วัน':'/day'}` : r.amount ? `${fmtMoney(r.amount)} ฿` : '';
                return `<div class="rider-row">
                  <div class="rider-name">${r.fromFirst?'<span style="color:var(--green)">●</span>':'<span style="color:var(--amber)">●</span>'} ${r.name}</div>
                  <div><div class="rider-val">${val}</div>${r.deductible?`<div class="rider-ded">Ded. ${fmtMoney(r.deductible)} ฿</div>`:''}</div>
                </div>`;
              }).join('')}
            `).join('')}
            ${cards.length ? `
              <div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin:8px 0 4px">🏥 ${th?'บัตรหาหมอ':'Hospital Cards'}</div>
              ${cards.map(c=>`<div class="rider-row">
                <div class="rider-name">🏥 ${c.card_title||c.title||'บัตร'} — ${c.hospital_name||''}</div>
                <div><button class="btn-glass" style="font-size:10px;padding:3px 8px" onclick="editHospitalCard('${c.id}')">✏️</button></div>
              </div>`).join('')}
            ` : ''}
            <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
              <button class="btn-glass" style="font-size:12px;padding:7px 12px" onclick="openAddRider('${pol.id||pol.policy_number}','${pol.policy_name}')">+ ${t('addRider')}</button>
              <button class="btn-glass" style="font-size:12px;padding:7px 12px" onclick="openAddHospitalCard('${pol.id||pol.policy_number}','${pol.policy_name}')">🏥 + ${t('addCard')}</button>
              <button class="btn-glass" style="font-size:12px;padding:7px 12px" onclick="openEditPolicy('${pol.id||pol.policy_number}')">✏️ ${t('edit')}</button>
            </div>
          </div>` : `
          <div style="padding:8px 14px 10px;display:flex;gap:6px">
            <button class="btn-glass" style="font-size:12px;padding:7px 12px" onclick="openAddRider('${pol.id||pol.policy_number}','${pol.policy_name}')">+ ${t('addRider')}</button>
            <button class="btn-glass" style="font-size:12px;padding:7px 12px" onclick="openAddHospitalCard('${pol.id||pol.policy_number}','${pol.policy_name}')">🏥 + ${t('addCard')}</button>
          </div>`}
      </div>`;
  }

  const sitTabs = [
    {key:'all', label:t('insAll'), icon:'📋'},
    {key:'room', label:t('insRoom'), icon:'🛏'},
    {key:'icu', label:'ICU', icon:'🏥'},
    {key:'surgery', label:t('insSurgery'), icon:'🪡'},
    {key:'opd', label:t('insOPD'), icon:'💊'},
    {key:'cash', label:t('insCash'), icon:'💵'},
    {key:'ci', label:t('insCI'), icon:'🧬'},
  ];

  // Profile tabs
  const p = S.currentProfile;
  let pTabs = '<div class="profile-select-row">';
  S.profiles.forEach(prof => { pTabs += `<button class="profile-btn ${prof.id===(p?.id)?'active':''}" onclick="switchProfile('${prof.id}')">${(prof.full_name||'').split(' ')[0]}</button>`; });
  pTabs += '</div>';

  const v = S.insView || 'all';
  const html = `
    ${pTabs}
    <div class="ins-situation-tabs">
      ${sitTabs.map(s=>`<button class="sit-btn ${s.key===v?'active':''}" onclick="switchInsView('${s.key}')">${s.icon} ${s.label}</button>`).join('')}
    </div>

    ${buildIPDWorkflow()}
    ${buildCoverageSummary()}

    ${v === 'all' ? `
      <div class="search-bar">
        <input class="search-input" placeholder="${t('searchPlaceholder')}" value="${S.insSearch||''}" oninput="S.insSearch=this.value;renderInsurance()">
      </div>
      ${buildAllPolicies()}
      <button class="btn-glass" style="width:100%;margin-top:8px" onclick="openAddPolicy()">+ ${t('addPolicy')}</button>
      <button class="btn-glass" style="width:100%;margin-top:6px;color:var(--amber);border-color:rgba(251,191,36,.25)" onclick="openAddInsurer()">🏢 + ${t('addInsurer')}</button>
    ` : buildSituationView(v)}
  `;
  document.getElementById('tab-insurance').innerHTML = html;
}

function switchInsView(v) { S.insView = v; renderInsurance(); }

function toggleRiders(polId) {
  const body = document.getElementById('riders-'+polId);
  const icon = document.getElementById('ricon-'+polId);
  if (!body) return;
  body.classList.toggle('open');
  if (icon) icon.textContent = body.classList.contains('open') ? '▲' : '▼';
}

  openModal('+ ' + t('addPolicy'), `
    <div class="field-group"><label>${S.lang==='th'?'บริษัทประกัน':'Insurer'}</label>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field-group"><label>${S.lang==='th'?'เบี้ยประกัน/ปี (฿)':'Annual Premium (฿)'}</label><input type="number" id="np-prem" placeholder="25000"></div>
      <div class="field-group"><label>${S.lang==='th'?'ทุนประกัน (฿)':'Sum Assured (฿)'}</label><input type="number" id="np-sum" placeholder="5000000"></div>
      <div class="field-group"><label>${S.lang==='th'?'เดือนครบกำหนด':'Due Month'}</label><input type="number" id="np-duem" min="1" max="12" placeholder="6"></div>
      <div class="field-group"><label>${S.lang==='th'?'ปีที่จ่ายล่าสุด':'Last Paid Year'}</label><input type="number" id="np-paidyr" placeholder="${new Date().getFullYear()}"></div>
    </div>
    <div class="field-group"><label>${S.lang==='th'?'ผู้ถือกรมธรรม์':'Policy Holder'}</label>
      <select id="np-holder">${S.profiles.map(p=>`<option value="${p.full_name||p.name}">${p.full_name||p.name}</option>`).join('')}</select></div>

}

function getInsurerOptions() {
  const defaults = ['AIA','Allianz Ayudhya','TLI (ไทยประกันชีวิต)','AXA','Cigna','BUPA','Muang Thai Life','Bangkok Life','FWD','SCB Life','Krungthai AXA','Tokio Marine','LMG','Falcon','Viriyah','MTL','Pacific Cross','DHIPAYA','TISCO Life','Chubb Life'];
  return defaults.map(n=>`<option value="${n}">${n}</option>`).join('');
}

async function saveNewPolicy() {
  const insurer = document.getElementById('np-ins').value;
  const name = document.getElementById('np-pname').value.trim();
  const pno = document.getElementById('np-pno').value.trim();
  const cat = document.getElementById('np-pcat').value;
  const prem = parseFloat(document.getElementById('np-prem').value)||null;
  const sum = parseFloat(document.getElementById('np-sum').value)||null;
  const duem = parseInt(document.getElementById('np-duem').value)||null;
  const paidyr = parseInt(document.getElementById('np-paidyr').value)||null;
  const holder = document.getElementById('np-holder').value;
  if (!name) { toast('⚠️ กรุณากรอกชื่อกรมธรรม์'); return; }
  const pol = {
    policy_name: name, policy_number: pno||null,
    insurer_code: insurer.split(' ')[0], policy_category: cat,
    annual_premium: prem, sum_assured: sum,
    premium_due_month: duem, paid_year: paidyr,
    holder_name: holder, policy_status: 'active',
    owner_id: S.user.id,
    profile_id: S.currentProfile?.id
  };
  if (S.demoMode) {
    pol.id = 'demo-pol-'+Date.now(); pol.riders = []; pol.policy_images = []; pol.hospital_cards = [];
    S.policies.push(pol);
  } else {
    const {data, error} = await dbInsert('insurance_policies', pol);
    if (error) { toast('❌ '+error.message); return; }
    if (data?.[0]) { S.policies.push({...data[0], riders:[], policy_images:[], hospital_cards:[]}); }
  }
  closeModal(); renderInsurance(); toast('✅ เพิ่มกรมธรรม์แล้ว');
}

// ── ADD RIDER (saves to DB) ─────────────────────────────────────
function openAddRider(polId, polName) {
  const th = S.lang === 'th';
  const catOpts = Object.entries(I18N.th.riderCats).map(([k,v]) => `<option value="${k}">${v} (${I18N.en.riderCats[k]||k})</option>`).join('');
  openModal(`+ ${t('addRider')} — ${polName}`, `
    <div class="field-group"><label>${th?'ชื่อสัญญาเพิ่มเติม':'Rider Name'}</label><input id="nr-name" placeholder="ค่าห้องและอาหาร"></div>
    <div class="field-group"><label>${th?'ประเภท (Category)':'Category'}</label><select id="nr-cat">${catOpts}</select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field-group"><label>${th?'วงเงิน (฿)':'Coverage Amount (฿)'}</label><input type="number" id="nr-amt" placeholder="500000"></div>
      <div class="field-group"><label>${th?'ต่อวัน (฿)':'Per Day (฿)'}</label><input type="number" id="nr-day" placeholder="4500"></div>
    </div>
    <div class="field-group">
      <label><input type="checkbox" id="nr-first" checked> ${th?'ตั้งแต่บาทแรก (ไม่มี Deductible)':'Covers from 1st Baht'}</label>

    <div class="field-group" id="ded-field">
      <label>${th?'Deductible (฿)':'Deductible (฿)'}</label>
      <input type="number" id="nr-ded" placeholder="20000">

    <button class="btn-primary" onclick="saveNewRider('${polId}')">💾 ${t('save')}</button>

async function saveNewRider(polId) {
  const name = document.getElementById('nr-name').value.trim();
  const cat = document.getElementById('nr-cat').value;
  const amt = parseFloat(document.getElementById('nr-amt').value)||null;
  const day = parseFloat(document.getElementById('nr-day').value)||null;
  const fromFirst = document.getElementById('nr-first').checked;
  const ded = fromFirst ? null : (parseFloat(document.getElementById('nr-ded').value)||null);
  if (!name) { toast('⚠️ กรุณากรอกชื่อ'); return; }

  const rider = {
    rider_name: name, rider_category: cat,
    coverage_amount: amt, per_day: day,
    covers_from_first_baht: fromFirst,
    has_deductible: !fromFirst, deductible_amount: ded,
    is_active: true
  };

  const pol = S.policies.find(p => (p.id||p.policy_number) === polId);
  if (!pol) { toast('❌ ไม่พบกรมธรรม์'); return; }

  if (S.demoMode) {
    if (!pol.riders) pol.riders = [];
    pol.riders.push({id:'demo-r-'+Date.now(), name, cat, amount:amt, perDay:day, fromFirst, hasDeductible:!fromFirst, deductible:ded});
  } else {
    rider.policy_id = pol.id;
    const {data, error} = await dbInsert('policy_riders', rider);
    if (error) { toast('❌ '+error.message); return; }
    if (data?.[0]) {
      if (!pol.riders) pol.riders = [];
      pol.riders.push({id:data[0].id, name:data[0].rider_name, cat:data[0].rider_category, amount:data[0].coverage_amount, perDay:data[0].per_day, fromFirst:data[0].covers_from_first_baht, hasDeductible:data[0].has_deductible, deductible:data[0].deductible_amount});
    }
  }
  closeModal(); renderInsurance(); toast('✅ บันทึกสัญญาเพิ่มเติมลง DB แล้ว');
}

// ── ADD HOSPITAL CARDS (multi-card per policy) ──────────────────
function openAddHospitalCard(polId, polName) {
  const th = S.lang === 'th';

async function saveHospitalCard(polId) {
  const title = document.getElementById('nc-title').value.trim();
  const hosp = document.getElementById('nc-hosp').value.trim();
  const cardno = document.getElementById('nc-cardno').value.trim();
  const exp = document.getElementById('nc-exp').value || null;
  const notes = document.getElementById('nc-notes').value.trim();
  if (!title) { toast('⚠️ กรุณากรอกชื่อบัตร'); return; }
  const pol = S.policies.find(p => (p.id||p.policy_number) === polId);
  if (!pol) return;
  const card = {card_title:title, hospital_name:hosp||null, card_number:cardno||null, valid_until:exp, notes:notes||null};
  if (S.demoMode) {
    if (!pol.hospital_cards) pol.hospital_cards = [];
    pol.hospital_cards.push({id:'demo-card-'+Date.now(), ...card});
  } else {
    card.policy_id = pol.id;
    const {data, error} = await dbInsert('hospital_cards', card);
    if (error) { toast('❌ '+error.message); return; }
    if (data?.[0]) {
      if (!pol.hospital_cards) pol.hospital_cards = [];
      pol.hospital_cards.push(data[0]);
    }
  }
  closeModal(); renderInsurance(); toast('✅ เพิ่มบัตรหาหมอแล้ว');
}

async function deleteHospitalCard(cardId, polId) {
  const pol = S.policies.find(p => (p.id||p.policy_number) === polId);
  if (!pol) return;
  pol.hospital_cards = (pol.hospital_cards||[]).filter(c => (c.id||'').toString() !== cardId.toString());
  if (!S.demoMode) await dbDelete('hospital_cards', cardId);
  closeModal(); renderInsurance(); toast('🗑 ลบบัตรแล้ว');
}

async function handlePolicyImgUpload(input) {

  if (!pol.policy_images) pol.policy_images = [];
  const imgObj = {id:'img-'+Date.now(), image_data: b64, label:'card'};
  pol.policy_images.push(imgObj);

    const {error} = await sb.schema(SCHEMA).from('policy_images').insert({policy_number: pol.policy_number||pol.id, owner_id: S.user.id, image_data: b64, image_label:'card'});

let _imgViewerImages = [];
let _imgViewerIdx = 0;
function openImgViewer(polId, idx) {
  const pol = S.policies.find(p => (p.id||p.policy_number) === polId);
