async function processWithAI(){
  var fileInput = document.getElementById('fu');
  if(!fileInput || !fileInput.files.length){ toast(S.lang==='th'?'กรุณาเลือกไฟล์ก่อน':'Please select a file first'); return; }
  var resultBox = document.getElementById('ai-result-box');
  if(resultBox){ resultBox.style.display='block'; resultBox.innerHTML='<div class="notice pulse">&#x1F916; '+(S.lang==='th'?'AI กำลังอ่านผลตรวจ...':'AI reading your report...')+'</div>'; }
  var file = fileInput.files[0];
  var reader = new FileReader();
  reader.onload = async function(e){
    var base64 = e.target.result.split(',')[1];
    var mimeType = file.type||'image/jpeg';
    var year = parseInt(document.getElementById('up-year').value)||new Date().getFullYear();
    var pid = document.getElementById('up-profile').value;
    try {
      var resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
        body:JSON.stringify({model:'claude-opus-4-6',max_tokens:2000,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mimeType,data:base64}},
          {type:'text',text:'Extract health data from this Thai/English medical report. Return ONLY valid JSON: {"check_date":"YYYY-MM-DD","hospital":"","weight_kg":null,"height_cm":null,"blood_pressure":"","pulse_rate":null,"hemoglobin":null,"hematocrit":null,"wbc":null,"neutrophil":null,"eosinophil":null,"platelet":null,"cholesterol":null,"triglyceride":null,"hdl":null,"ldl":null,"blood_sugar":null,"hba1c":null,"creatinine":null,"egfr":null,"uric_acid":null,"bun":null,"sgot":null,"sgpt":null,"alp":null,"doctor_notes":""}'}
        ]}]})
      });
      if(!resp.ok) throw new Error('API error '+resp.status);
      var data = await resp.json();
      var txt = data.content[0].text;
      var m = txt.match(/\{[\s\S]*\}/);
      showExtractedPreview(pid, year, m?JSON.parse(m[0]):null, resultBox);
    } catch(err){ showExtractedPreview(pid, year, null, resultBox); }
  };
  reader.readAsDataURL(file);
}

function showExtractedPreview(pid, year, extracted, resultBox){
  extracted = extracted||{};
  var found = Object.entries(extracted).filter(function(e){return e[1]!==null&&e[1]!=='';}).length;
  var html = found>0
    ? '<div class="alert ok">&#x2705; <b>'+(S.lang==='th'?'AI อ่านสำเร็จ':'AI extracted')+'</b> '+found+' '+(S.lang==='th'?'รายการ':'fields')+'</div>'
    : '<div class="notice">'+(S.lang==='th'?'อ่านไม่ได้อัตโนมัติ กรอกเองด้วย Manual Entry':'Could not auto-extract. Use Manual Entry.')+'</div>';
  if(!HR[pid]) HR[pid]={};
  if(!HR[pid][year]) HR[pid][year]={age:calcAge(prof(pid).dob,year)};
  var d=HR[pid][year];
  var map={check_date:'date',hospital:'hospital',weight_kg:'weight',height_cm:'height',blood_pressure:'bp',pulse_rate:'pulse',hemoglobin:'hb',hematocrit:'hct',wbc:'wbc',neutrophil:'neut',eosinophil:'eos',platelet:'plat',cholesterol:'chol',triglyceride:'trig',hdl:'hdl',ldl:'ldl',blood_sugar:'sugar',hba1c:'hba1c',creatinine:'creat',egfr:'egfr',uric_acid:'uric',bun:'bun',sgot:'sgot',sgpt:'sgpt',alp:'alp',doctor_notes:'notes'};
  Object.entries(map).forEach(function(e){if(extracted[e[0]]!=null) d[e[1]]=extracted[e[0]];});
  if(d.weight&&d.height) d.bmi=parseFloat(bmi(d.weight,d.height));
  html+='<button class="btn btn-primary" style="margin-top:10px" onclick="confirmAISave(\''+pid+'\','+year+')">&#x1F4BE; '+(S.lang==='th'?'บันทึกข้อมูล':'Save & Confirm')+'</button>';
  if(resultBox) resultBox.innerHTML=html;
}

function confirmAISave(pid,year){
  S.year=year; closeModal();
  if(!S.demo&&sbAuth){ saveHealthRecordToDB(pid,year,HR[pid][year]).then(function(ok){ toast(ok?'Saved to DB ✓':'Saved locally'); renderTab(S.tab); }); }
  else { toast('Saved'); renderTab(S.tab); }
}

// ── MODAL ─────────────────────────────────────────────
function openModal(title, body){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').className = 'on';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').className = '';
}

// ── TOAST ─────────────────────────────────────────────
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='on';
  setTimeout(function(){ el.className=''; },2800);
}
