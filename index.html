function updateImgViewer() {
  const img = _imgViewerImages[_imgViewerIdx];
  const src = img?.image_data || img?.data || img?.image_url || img || '';
  document.getElementById('img-viewer-img').src = src;
  const showNav = _imgViewerImages.length > 1;
  document.getElementById('img-nav-prev').style.display = showNav ? 'flex' : 'none';
  document.getElementById('img-nav-next').style.display = showNav ? 'flex' : 'none';
  const counter = document.getElementById('img-counter');
  counter.style.display = showNav ? 'block' : 'none';
  if (showNav) counter.textContent = `${_imgViewerIdx+1} / ${_imgViewerImages.length}`;
}

function closeImgViewer() {
  document.getElementById('img-viewer').classList.remove('open');
  _imgViewerImages = []; _imgViewerIdx = 0;
}
function imgNavPrev() { if (_imgViewerIdx > 0) { _imgViewerIdx--; updateImgViewer(); } }
function imgNavNext() { if (_imgViewerIdx < _imgViewerImages.length-1) { _imgViewerIdx++; updateImgViewer(); } }

function setupPinchZoom() {
  const img = document.getElementById('img-viewer-img');
  let scale = 1, lastScale = 1, startX = 0, startY = 0, tx = 0, ty = 0;
  let touching = false;

  img.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) { touching = true; lastScale = scale; }
    else if (e.touches.length === 1 && scale > 1) { startX = e.touches[0].clientX - tx; startY = e.touches[0].clientY - ty; }
  }, {passive:true});
  img.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 2 && touching) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (!img._lastDist) img._lastDist = dist;
      scale = Math.max(1, Math.min(5, lastScale * (dist/img._lastDist)));
      img.style.transform = `scale(${scale}) translate(${tx}px,${ty}px)`;
    } else if (e.touches.length === 1 && scale > 1) {
      tx = e.touches[0].clientX - startX; ty = e.touches[0].clientY - startY;
      img.style.transform = `scale(${scale}) translate(${tx}px,${ty}px)`;
    }
  }, {passive:false});
  img.addEventListener('touchend', function(e) {
    if (e.touches.length === 0) { touching = false; img._lastDist = null; if (scale <= 1) { scale=1; tx=0; ty=0; img.style.transform=''; } }
  }, {passive:true});
}

function exportDataCSV() {
  const p = S.currentProfile;
  if (!p) return;
  const recs = S.healthRecords[p.id] || {};
  const years = Object.keys(recs).sort();
  const fields = ['record_year','weight','height','bmi','bp_systolic','bp_diastolic','glucose','hba1c','total_cholesterol','ldl','hdl','triglyceride','hemoglobin','wbc','platelet','creatinine','bun','uric_acid','sgot','sgpt','alk_phos'];
  const rows = [fields.join(',')];
  years.forEach(y => { const r = recs[y]; rows.push(fields.map(f=>(r[f]!==null&&r[f]!==undefined)?r[f]:'').join(',')); });
  const csv = rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `HealthVault_${(p.full_name||'').replace(/ /g,'_')}_${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ ดาวน์โหลด CSV แล้ว');
}

    });

    document.getElementById('network-warn').style.display = 'none';
  } catch(e) {
    // Can't reach Supabase — show warning
    document.getElementById('network-warn').style.display = 'block';
  }

  // Check existing session
  if (sb) {
    try {
      const {data, error} = await sb.auth.getSession();
      if (error) throw error;
      if (data?.session?.user) {
        S.user = data.session.user;
        toast('🔄 กำลังโหลด…');
        await loadAppData();
        launchApp();
        return;
      }
    } catch(e) {
      console.warn('Session check failed:', e.message);
      if (e.message?.includes('fetch')) {
        // Show login with network warning

      }
    }
  }

  // Show login
  document.getElementById('login-screen').style.display = 'flex';
}
