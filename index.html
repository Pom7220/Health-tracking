
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HealthVault — Personal Health & Insurance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.10);
    --glass-active: rgba(255,255,255,0.14);
    --accent-blue: #4fc3f7;
    --accent-blue-glow: rgba(79,195,247,0.3);
    --accent-teal: #26d9b0;
    --accent-teal-glow: rgba(38,217,176,0.3);
    --accent-amber: #ffb74d;
    --accent-amber-glow: rgba(255,183,77,0.3);
    --accent-rose: #f06292;
    --accent-rose-glow: rgba(240,98,146,0.3);
    --accent-violet: #9c7fe0;
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.30);
    --green: #69f0ae;
    --red: #ff5252;
    --yellow: #ffd740;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --tab-height: 82px;
    --header-height: 60px;
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --blur: blur(24px);
    --blur-heavy: blur(40px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background:var(--bg-primary);
    color:var(--text-primary);
    font-family:'DM Sans', system-ui, -apple-system, sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* Animated background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,195,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(38,217,176,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(156,127,224,0.05) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  /* ─── App Shell ─────────────────────────────── */
  #app {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    padding-top: var(--safe-top);
  }

  /* ─── Auth Screen ─────────────────────────── */
  #auth-screen {
    position:fixed; inset:0; z-index:100;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 40px 32px;
    background:var(--bg-primary);
  }
  #auth-screen::before {
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(79,195,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 100%, rgba(38,217,176,0.08) 0%, transparent 60%);
    pointer-events:none;
  }

  .auth-logo {
    width:72px; height:72px;
    background:linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
    border-radius:24px;
    display:flex; align-items:center; justify-content:center;
    font-size:32px;
    box-shadow:0 20px 60px rgba(79,195,247,0.3);
    margin-bottom:24px;
    position:relative; z-index:1;
  }
  .auth-title {
    font-family:'DM Serif Display', serif;
    font-size:32px; font-weight:400;
    color:var(--text-primary);
    margin-bottom:8px; text-align:center;
    position:relative; z-index:1;
  }
  .auth-subtitle {
    font-size:15px; color:var(--text-secondary);
    margin-bottom:40px; text-align:center;
    position:relative; z-index:1;
  }
  .auth-card {
    width:100%; max-width:380px;
    background:var(--glass-bg);
    backdrop-filter:var(--blur);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-lg);
    padding:32px 28px;
    position:relative; z-index:1;
  }
  .auth-tabs {
    display:flex; gap:4px;
    background:rgba(0,0,0,0.3);
    border-radius:var(--radius-sm);
    padding:4px;
    margin-bottom:24px;
  }
  .auth-tab {
    flex:1; padding:8px;
    text-align:center; font-size:14px; font-weight:500;
    border-radius:8px; cursor:pointer;
    color:var(--text-secondary);
    transition:all 0.2s;
  }
  .auth-tab.active {
    background:rgba(79,195,247,0.15);
    color:var(--accent-blue);
  }

  /* ─── Header ─────────────────────────────────── */
  #header {
    height:var(--header-height);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
    position:relative; z-index:10;
    flex-shrink:0;
  }
  .header-profile {
    display:flex; align-items:center; gap:10px;
  }
  .header-avatar {
    width:36px; height:36px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:600;
    flex-shrink:0;
  }
  .avatar-r { background:linear-gradient(135deg, #4fc3f7, #0288d1); }
  .avatar-k { background:linear-gradient(135deg, #f06292, #c2185b); }
  .header-name {
    font-size:16px; font-weight:600;
  }
  .header-actions { display:flex; gap:8px; }
  .icon-btn {
    width:36px; height:36px; border-radius:10px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px;
    transition:all 0.2s; color:var(--text-secondary);
  }
  .icon-btn:hover { background:var(--glass-hover); color:var(--text-primary); }

  /* ─── Content Area ─────────────────────────── */
  #content {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:0 16px;
    padding-bottom:calc(var(--tab-height) + var(--safe-bottom) + 16px);
    position:relative; z-index:1;
    scroll-behavior:smooth;
  }
  #content::-webkit-scrollbar { display:none; }

  /* ─── Tab Bar ────────────────────────────────── */
  #tabbar {
    position:fixed; bottom:0; left:0; right:0;
    height:calc(var(--tab-height) + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    background:rgba(10,10,15,0.85);
    backdrop-filter:var(--blur-heavy);
    border-top:1px solid var(--glass-border);
    display:flex; align-items:flex-start;
    padding-top:8px;
    z-index:50;
  }
  .tab-item {
    flex:1; display:flex; flex-direction:column;
    align-items:center; gap:4px;
    padding:4px 2px;
    cursor:pointer; user-select:none;
    transition:all 0.2s;
  }
  .tab-icon {
    width:44px; height:28px;
    display:flex; align-items:center; justify-content:center;
    border-radius:14px; font-size:18px;
    transition:all 0.2s;
  }
  .tab-item.active .tab-icon {
    background:rgba(79,195,247,0.15);
  }
  .tab-label {
    font-size:10px; font-weight:500;
    color:var(--text-muted);
    transition:all 0.2s;
    letter-spacing:0.01em;
  }
  .tab-item.active .tab-label { color:var(--accent-blue); }

  /* ─── Pages ─────────────────────────────────── */
  .page { display:none; }
  .page.active { display:block; }

  /* ─── Section titles ─────────────────────── */
  .section-title {
    font-family:'DM Serif Display', serif;
    font-size:22px; font-weight:400;
    margin-bottom:16px; margin-top:24px;
    color:var(--text-primary);
  }
  .section-subtitle {
    font-size:13px; color:var(--text-secondary);
    margin-top:-12px; margin-bottom:16px;
  }

  /* ─── Cards ──────────────────────────────────── */
  .card {
    background:var(--glass-bg);
    backdrop-filter:var(--blur);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-lg);
    padding:18px;
    margin-bottom:12px;
    transition:all 0.2s;
  }
  .card:hover { background:var(--glass-hover); }
  .card-sm {
    border-radius:var(--radius-md);
    padding:14px;
  }

  /* ─── Metric row ─────────────────────────── */
  .metric-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:10px; margin-bottom:12px;
  }
  .metric-grid-3 { grid-template-columns:1fr 1fr 1fr; }
  .metric-card {
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-md);
    padding:14px 12px;
    display:flex; flex-direction:column; gap:4px;
  }
  .metric-label {
    font-size:11px; color:var(--text-secondary);
    font-weight:500; letter-spacing:0.03em;
    text-transform:uppercase;
  }
  .metric-value {
    font-size:22px; font-weight:600;
    line-height:1;
  }
  .metric-unit {
    font-size:11px; color:var(--text-secondary);
    font-weight:400;
  }
  .metric-delta {
    font-size:11px; font-weight:500;
    display:flex; align-items:center; gap:3px;
    margin-top:2px;
  }
  .delta-up { color:var(--accent-rose); }
  .delta-down { color:var(--green); }
  .delta-neutral { color:var(--text-muted); }

  /* Status indicators */
  .status-dot {
    width:8px; height:8px; border-radius:50%;
    display:inline-block; flex-shrink:0;
  }
  .status-ok { background:var(--green); }
  .status-warn { background:var(--yellow); }
  .status-alert { background:var(--red); }
  .status-info { background:var(--accent-blue); }

  /* Badges */
  .badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 8px; border-radius:20px;
    font-size:11px; font-weight:600;
    letter-spacing:0.02em;
  }
  .badge-ok { background:rgba(105,240,174,0.12); color:var(--green); }
  .badge-warn { background:rgba(255,215,64,0.12); color:var(--yellow); }
  .badge-alert { background:rgba(255,82,82,0.12); color:var(--red); }
  .badge-info { background:rgba(79,195,247,0.12); color:var(--accent-blue); }
  .badge-violet { background:rgba(156,127,224,0.12); color:var(--accent-violet); }

  /* ─── Dashboard ──────────────────────────── */
  .profile-switcher {
    display:flex; gap:8px; margin-bottom:20px;
  }
  .profile-pill {
    display:flex; align-items:center; gap:8px;
    padding:8px 14px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    border-radius:20px;
    cursor:pointer; font-size:14px; font-weight:500;
    color:var(--text-secondary);
    transition:all 0.2s;
  }
  .profile-pill.active {
    background:rgba(79,195,247,0.12);
    border-color:rgba(79,195,247,0.35);
    color:var(--accent-blue);
  }
  .profile-pill.active-k {
    background:rgba(240,98,146,0.12);
    border-color:rgba(240,98,146,0.35);
    color:var(--accent-rose);
  }

  /* Hero card on dashboard */
  .hero-card {
    background:linear-gradient(135deg, rgba(79,195,247,0.1), rgba(38,217,176,0.08));
    border:1px solid rgba(79,195,247,0.2);
    border-radius:var(--radius-lg);
    padding:22px;
    margin-bottom:12px;
    position:relative; overflow:hidden;
  }
  .hero-card::before {
    content:'';
    position:absolute; top:-40px; right:-40px;
    width:160px; height:160px;
    background:radial-gradient(circle, rgba(79,195,247,0.12), transparent 70%);
    pointer-events:none;
  }
  .hero-name {
    font-family:'DM Serif Display', serif;
    font-size:26px; margin-bottom:4px;
  }
  .hero-meta {
    font-size:13px; color:var(--text-secondary);
    display:flex; gap:12px; flex-wrap:wrap;
  }
  .hero-meta span { display:flex; align-items:center; gap:4px; }

  /* Alert banner */
  .alert-banner {
    display:flex; align-items:flex-start; gap:12px;
    padding:14px 16px;
    border-radius:var(--radius-md);
    margin-bottom:10px;
    font-size:13px;
  }
  .alert-banner.warn {
    background:rgba(255,215,64,0.08);
    border:1px solid rgba(255,215,64,0.2);
    color:var(--yellow);
  }
  .alert-banner.alert {
    background:rgba(255,82,82,0.08);
    border:1px solid rgba(255,82,82,0.2);
    color:var(--red);
  }
  .alert-banner.ok {
    background:rgba(105,240,174,0.08);
    border:1px solid rgba(105,240,174,0.2);
    color:var(--green);
  }
  .alert-banner.info {
    background:rgba(79,195,247,0.08);
    border:1px solid rgba(79,195,247,0.2);
    color:var(--accent-blue);
  }

  /* Timeline */
  .timeline-item {
    display:flex; gap:14px;
    padding-bottom:18px;
    position:relative;
  }
  .timeline-item::before {
    content:'';
    position:absolute; left:15px; top:28px; bottom:0;
    width:1px; background:var(--glass-border);
  }
  .timeline-item:last-child::before { display:none; }
  .timeline-dot {
    width:30px; height:30px; border-radius:10px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; flex-shrink:0; margin-top:2px;
  }
  .timeline-content { flex:1; }
  .timeline-title { font-size:14px; font-weight:500; margin-bottom:2px; }
  .timeline-date { font-size:12px; color:var(--text-muted); }
  .timeline-desc { font-size:13px; color:var(--text-secondary); margin-top:4px; }

  /* ─── Charts ─────────────────────────────────── */
  .chart-container {
    position:relative; width:100%;
    height:200px;
  }
  .chart-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .chart-title { font-size:15px; font-weight:600; }
  .chart-legend {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;
  }
  .legend-item {
    display:flex; align-items:center; gap:5px;
    font-size:11px; color:var(--text-secondary);
  }
  .legend-dot {
    width:8px; height:8px; border-radius:50%;
  }

  /* ─── Health Records ─────────────────────── */
  .year-selector {
    display:flex; gap:6px; overflow-x:auto; padding-bottom:4px;
    margin-bottom:16px; scrollbar-width:none;
  }
  .year-selector::-webkit-scrollbar { display:none; }
  .year-pill {
    padding:6px 14px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    border-radius:20px; cursor:pointer;
    font-size:13px; font-weight:500;
    color:var(--text-secondary);
    white-space:nowrap; flex-shrink:0;
    transition:all 0.2s;
  }
  .year-pill.active {
    background:rgba(79,195,247,0.12);
    border-color:rgba(79,195,247,0.4);
    color:var(--accent-blue);
  }

  .health-category {
    margin-bottom:16px;
  }
  .category-header {
    display:flex; align-items:center; gap:8px;
    padding:10px 0; cursor:pointer;
    border-bottom:1px solid var(--glass-border);
    margin-bottom:10px;
  }
  .category-title {
    font-size:13px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.06em;
    color:var(--text-secondary);
    flex:1;
  }
  .category-icon { font-size:16px; }

  .data-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
    gap:10px;
  }
  .data-row:last-child { border-bottom:none; }
  .data-name {
    font-size:13px; color:var(--text-secondary);
    flex:1; line-height:1.3;
  }
  .data-value {
    font-size:14px; font-weight:600;
    text-align:right; flex-shrink:0;
  }
  .data-normal { font-size:11px; color:var(--text-muted); text-align:right; }

  /* ─── Insurance ──────────────────────────── */
  .insurance-card {
    background:linear-gradient(135deg, rgba(156,127,224,0.1), rgba(79,195,247,0.06));
    border:1px solid rgba(156,127,224,0.2);
    border-radius:var(--radius-lg);
    padding:20px;
    margin-bottom:12px;
    position:relative; overflow:hidden;
  }
  .insurance-logo {
    position:absolute; right:16px; top:16px;
    font-size:28px; opacity:0.4;
  }
  .insurance-type {
    font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.08em;
    color:var(--accent-violet);
    margin-bottom:6px;
  }
  .insurance-name {
    font-size:18px; font-weight:600;
    margin-bottom:4px;
  }
  .insurance-policy {
    font-size:12px; color:var(--text-muted);
    font-family:monospace; letter-spacing:0.05em;
    margin-bottom:14px;
  }
  .coverage-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .coverage-item {
    background:rgba(0,0,0,0.2);
    border-radius:var(--radius-sm);
    padding:10px;
  }
  .coverage-label {
    font-size:10px; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:0.05em;
    margin-bottom:2px;
  }
  .coverage-value {
    font-size:14px; font-weight:600;
    color:var(--accent-violet);
  }

  /* Premium due */
  .premium-due {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px;
    background:rgba(255,183,77,0.08);
    border:1px solid rgba(255,183,77,0.2);
    border-radius:var(--radius-md);
    margin-bottom:10px;
  }
  .premium-info { flex:1; }
  .premium-title { font-size:13px; font-weight:500; }
  .premium-date { font-size:12px; color:var(--text-muted); }
  .premium-amount {
    font-size:16px; font-weight:700; color:var(--accent-amber);
  }

  /* ─── Compare Tab ─────────────────────────── */
  .compare-header {
    display:flex; gap:10px; margin-bottom:16px; align-items:stretch;
  }
  .compare-profile {
    flex:1; padding:14px;
    border-radius:var(--radius-md);
    border:1px solid var(--glass-border);
    text-align:center;
  }
  .compare-profile.r {
    background:rgba(79,195,247,0.06);
    border-color:rgba(79,195,247,0.2);
  }
  .compare-profile.k {
    background:rgba(240,98,146,0.06);
    border-color:rgba(240,98,146,0.2);
  }
  .compare-name {
    font-size:13px; font-weight:600; margin-bottom:2px;
  }
  .compare-age { font-size:11px; color:var(--text-muted); }

  .compare-row {
    display:grid; grid-template-columns:1fr auto 1fr;
    gap:8px; align-items:center;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .compare-row:last-child { border-bottom:none; }
  .compare-val {
    font-size:14px; font-weight:600;
    text-align:center;
  }
  .compare-label {
    font-size:12px; color:var(--text-muted);
    text-align:center;
  }

  /* ─── Upload / Photo ─────────────────────── */
  .upload-zone {
    border:2px dashed rgba(255,255,255,0.15);
    border-radius:var(--radius-lg);
    padding:40px 20px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s;
  }
  .upload-zone:hover {
    border-color:rgba(79,195,247,0.4);
    background:rgba(79,195,247,0.04);
  }
  .upload-icon { font-size:40px; margin-bottom:12px; }
  .upload-title { font-size:16px; font-weight:600; margin-bottom:6px; }
  .upload-sub { font-size:13px; color:var(--text-secondary); }

  /* ─── Form inputs ─────────────────────────── */
  .form-group { margin-bottom:16px; }
  .form-label {
    display:block; font-size:12px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.06em;
    color:var(--text-secondary); margin-bottom:8px;
  }
  .form-input {
    width:100%; padding:12px 14px;
    background:rgba(0,0,0,0.3);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-sm);
    color:var(--text-primary); font-size:14px;
    font-family:inherit;
    transition:all 0.2s; outline:none;
  }
  .form-input:focus {
    border-color:rgba(79,195,247,0.5);
    background:rgba(79,195,247,0.05);
  }
  .form-input::placeholder { color:var(--text-muted); }
  .form-select {
    width:100%; padding:12px 14px;
    background:rgba(0,0,0,0.4);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-sm);
    color:var(--text-primary); font-size:14px;
    font-family:inherit; outline:none;
    -webkit-appearance:none;

function switchAuthTab(tab) {

}

async function doLogin() {
  const btn = document.querySelector('#auth-login .btn-primary');
  if (btn) { btn.textContent = 'Signing in…'; btn.disabled = true; }

  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showToast('Please enter email and password'); return; }

  if (supabase) {
    try {
      const { data, error } = await supabaseAuth.auth.signInWithPassword({ email, password });
      if (error) throw error;
      state.user = data.user;
      state.demoMode = false;
      enterApp();
    } catch(e) {
      if (btn) { btn.textContent = 'Sign In'; btn.disabled = false; }
      showToast('❌ ' + e.message); console.error('Login error:', e);
    }
  } else {
    showToast('Supabase not configured. Using demo mode.');
    demoLogin();
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) { showToast('Please fill all fields'); return; }

  if (supabase) {

      showToast('Account created! Please check email to verify.');
    } catch(e) {

}

function getProfile(id) {
  return DEMO_DATA.profiles.find(p => p.id === id);
}

function getRecord(profileId, year) {
  return (DEMO_DATA.healthRecords[profileId] || {})[year];
}

function getLatestRecord(profileId) {
  const years = Object.keys(DEMO_DATA.healthRecords[profileId] || {}).map(Number).sort((a,b)=>b-a);
  if (!years.length) return null;
  return { year: years[0], ...DEMO_DATA.healthRecords[profileId][years[0]] };
}

function getBMI(weight, height) {
  if (!weight || !height) return null;
  return (weight / ((height/100)**2)).toFixed(1);
}

function bmiStatus(bmi) {
  if (!bmi) return { label: 'N/A', cls: 'badge-info' };
  const b = parseFloat(bmi);
  if (b < 18.5) return { label: 'Underweight', cls: 'badge-warn' };
  if (b <= 22.9) return { label: 'Normal', cls: 'badge-ok' };
  if (b <= 24.9) return { label: 'Overweight', cls: 'badge-warn' };
  return { label: 'Obese', cls: 'badge-alert' };
}

function ldlStatus(ldl) {
  if (!ldl) return { cls: 'data-value', badge: '' };
  if (ldl < 100) return { cls: 'data-value', badge: '<span class="badge badge-ok">Optimal</span>' };
  if (ldl < 130) return { cls: 'data-value', badge: '<span class="badge badge-ok">Good</span>' };
  if (ldl < 160) return { cls: 'data-value', badge: '<span class="badge badge-warn">Borderline</span>' };
  return { cls: 'data-value trend-up', badge: '<span class="badge badge-alert">High</span>' };
}

function statusBadge(value, min, max, higherBetter=false) {
  if (value === null || value === undefined) return '<span class="badge badge-info">N/A</span>';
  const v = parseFloat(value);
  if (isNaN(v)) return '<span class="badge badge-info">—</span>';
  const inRange = v >= min && v <= max;
  if (inRange) return '<span class="badge badge-ok">Normal</span>';
  if (!inRange && higherBetter && v < min) return '<span class="badge badge-alert">Low</span>';
  if (!inRange && !higherBetter && v > max) return '<span class="badge badge-alert">High</span>';
  return '<span class="badge badge-warn">Borderline</span>';
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  } catch { return dateStr; }
}

function deltaArrow(current, previous, lowerBetter=false) {
  if (!previous || !current) return '';
  const diff = parseFloat(current) - parseFloat(previous);
  if (Math.abs(diff) < 0.01) return '<span class="delta-neutral">→ No change</span>';
  const up = diff > 0;
  const good = lowerBetter ? !up : up;
  const cls = good ? 'delta-down' : 'delta-up';
  const icon = up ? '↑' : '↓';
  return `<span class="${cls}">${icon} ${Math.abs(diff).toFixed(1)}</span>`;
}

function getYearsForProfile(profileId) {
  return Object.keys(DEMO_DATA.healthRecords[profileId] || {}).map(Number).sort((a,b)=>a-b);
}

function fmtTHB(n) {
  return n ? n.toLocaleString('th-TH') + ' THB' : '—';
}

function dataRow(name, value, unit, min, max, normalText, prevValue, higherBetter=false) {
  if (value === null || value === undefined) return '';
  const v = parseFloat(value);
  let statusClass = 'data-value';
  let badgeHtml = '';
  
  if (!isNaN(v) && (min !== null || max !== null)) {
    const aboveMin = min === null || v >= min;
    const belowMax = max === null || v <= max;
    if (aboveMin && belowMax) {
      badgeHtml = '<span class="badge badge-ok">✓</span>';
    } else if (!aboveMin) {
      statusClass = 'data-value';
      badgeHtml = higherBetter ? '<span class="badge badge-alert">Low</span>' : '<span class="badge badge-warn">Low</span>';
    } else {
      statusClass = 'data-value';
      badgeHtml = !higherBetter ? '<span class="badge badge-alert">High</span>' : '<span class="badge badge-ok">High ✓</span>';
    }
  }

  const normalRange = normalText || (min !== null || max !== null ? `${min!==null&&min!==0?min+'-':''}${max!==999&&max!==null?max:''}` : '');
  
  return `
    <div class="data-row">
      <div>
        <div class="data-name">${name}</div>
        ${normalRange ? `<div class="data-normal">${normalRange} ${unit}</div>` : ''}
      </div>
      <div style="text-align:right;">
        <div class="${statusClass}">${value} <span class="metric-unit">${unit}</span></div>
        <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:2px;">
          ${badgeHtml}
          ${prevValue !== null && prevValue !== undefined ? deltaArrow(value, prevValue, !higherBetter) : ''}
        </div>
      </div>
    </div>
  `;
}

function generateInsight(pid) {
  const records = Object.entries(DEMO_DATA.healthRecords[pid]).map(([y,r]) => ({year:parseInt(y),...r})).sort((a,b)=>a.year-b.year);
  const latest = records[records.length-1];
  const profile = getProfile(pid);
  
  const insights = [];
  
  // LDL
  const ldlValues = records.map(r=>r.ldl).filter(Boolean);
  if (ldlValues.length > 1) {
    const trend = ldlValues[ldlValues.length-1] - ldlValues[0];
    if (trend > 20) insights.push(`🔴 <strong>LDL has increased ${trend.toFixed(0)} mg/dL over ${records.length} years</strong>. Current level (${latest.ldl} mg/dL) exceeds the 130 mg/dL target. This significantly increases cardiovascular risk. Recommend: dietary intervention, regular exercise, and cardiologist consultation.`);
    else if (latest.ldl > 130) insights.push(`🟡 <strong>LDL is elevated</strong> at ${latest.ldl} mg/dL. Reduce saturated fats, trans fats, and refined carbohydrates. Increase soluble fiber (oats, beans, fruits).`);
  }
  
  // HDL
  if (latest.hdl < 50) insights.push(`🟡 <strong>HDL is low</strong> (${latest.hdl} mg/dL). Low HDL reduces the body's ability to clear arterial plaque. Aerobic exercise, quitting smoking, and moderate alcohol consumption can help raise HDL.`);
  
  // Blood sugar
  if (latest.bloodSugar > 99) insights.push(`🟡 <strong>Blood sugar is borderline</strong> (${latest.bloodSugar} mg/dL). Prediabetes range is 100–125. Reducing refined sugar intake and increasing physical activity are key preventive measures.`);
  if (latest.hba1c && parseFloat(latest.hba1c) > 5.6) insights.push(`🟡 <strong>HbA1c (${latest.hba1c}%) approaching prediabetes threshold</strong> (≥5.7%). Monitor closely with annual tests.`);
  
  // Weight
  const bmi = latest.bmi || getBMI(latest.weight, latest.height);
  if (bmi && parseFloat(bmi) > 23) insights.push(`🟡 <strong>BMI ${bmi} is above Asian healthy range</strong> (18.5–22.9). Even modest weight loss (5–10%) can significantly improve lipid profiles and reduce diabetes risk.`);
  
  // Positive
  const creatValues = records.map(r=>r.creatinine).filter(Boolean);
  if (creatValues.every(v => v <= 1.02)) insights.push(`🟢 <strong>Kidney function has remained stable and normal</strong> across all years. Continue adequate hydration (2L+/day).`);
  
  if (!insights.length) insights.push(`🟢 <strong>Overall health markers are within acceptable ranges</strong>. Continue annual health checkups and maintain current lifestyle habits.`);
  
  return insights.join('<br><br>');
}

  const chartDefaults = {

  // Weight chart
  const weightEl = document.getElementById('chart-weight-' + pid);
  if (weightEl) {
    const validRecs = records.filter(r=>r.weight);

  // Kidney chart

  `;

function getValColor(v, min, max) {
  if (!v && v!==0) return 'var(--text-muted)';
  if (min && parseFloat(v)<min) return 'var(--yellow)';
  if (max && parseFloat(v)>max) return 'var(--red)';
  return 'var(--green)';
}

function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {

      if (session) {
        state.user = session.user;
        state.demoMode = false;
        enterApp();
      }
    } catch(e) {
      console.log('Session check failed or timed out:', e.message);
      // Stay on auth screen - user can log in manually

  }
});
